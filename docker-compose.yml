name: lingchu-bot

# Anchors for host/port reuse across services. Override via shell env or .env.prod.
x-config-host: &config-host ${HOST:-0.0.0.0}
x-config-port: &config-port ${PORT:-8080}

services:
  nonebot:
    build: .
    ports:
      - *config-port
    env_file:
      - .env.prod
    environment:
      ENVIRONMENT: prod
      HOST: *config-host
      PORT: *config-port
      # Container-aware defaults (override in .env.prod if needed).
      # LOCALSTORE_USE_CWD=true makes localstore resolve config/data/cache
      # under the project cwd (/app), so the named volumes below persist
      # across container restarts.
      LOCALSTORE_USE_CWD: "true"
      IN_CONTAINERS: "true"
      ALEMBIC_STARTUP_CHECK: "true"
    volumes:
      - lingchu-config:/app/config
      - lingchu-data:/app/data
      - lingchu-cache:/app/cache
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD-SHELL"
        - >
          python -c "import socket, os;
          p=int(os.getenv('PORT','8080'));
          s=socket.socket();
          s.connect(('localhost', p));
          s.close()"
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  smoke-test:
    build:
      context: .
      args:
        SMOKE_TEST: "true"
    env_file:
      - .env.prod
    environment:
      ENVIRONMENT: prod
      SMOKE_TEST: "true"
      LOCALSTORE_USE_CWD: "true"
      IN_CONTAINERS: "true"
    command: python /app/docker/smoke-test.py
    profiles:
      - smoke

volumes:
  lingchu-config:
  lingchu-data:
  lingchu-cache:
