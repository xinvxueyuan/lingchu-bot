[project]
name = "lingchu-bot"
version = "0.0.0-dev0"
description = "由NoneBot2驱动，符合 PEP8 规范的管理机器人"
keywords = ["nonebot2"]
readme = "README.md"
license = "LGPL-3.0-or-later AND GFDL-1.3-or-later"
license-files = ["LICENSE-code", "LICENSE-docs", "Repository-Policy.md"]
requires-python = ">=3.13.13, <3.14.0"
authors = []
maintainers = [{ name = "xinvxueyuan", email = "xinvxueyuan@yeah.net" }]
dependencies = [
    "psutil>=7.2.2",
    "jinja2>=3.1.6",
    "nonebot2[fastapi]>=2.5.0",
    "nonebot2[httpx]>=2.4.4",
    "nonebot2[websockets]>=2.4.4",
    "nonebot-plugin-apscheduler>=0.5.0",
    "nonebot-plugin-localstore>=0.7.4",
    "nonebot-plugin-orm[aiosqlite]>=0.8.3",
    "nonebot-plugin-alconna>=0.62.0",
    "nonebot-plugin-uninfo>=0.10.1",
    "nonebot-adapter-onebot>=2.4.6",
    "nonebot-adapter-milky>=1.2.0",
    "nonebot-adapter-github>=0.6.0",
    "nonebot-adapter-discord>=1.1.3",
    "nonebot-adapter-telegram>=0.1.0b20",
    "aiofiles>=25.1.0",
    "json5>=0.14.0",
    "babel>=2.18.0",
    "nonebot-plugin-htmlkit>=0.1.0rc5",
    "rtoml>=0.13.0",
    "arrow>=1.4.0",
    "typer>=0.25.1",
    "nonebot-plugin-wait-a-minute>=0.5.0",
]

[project.urls]
Homepage = "https://lingchu.zone.id/"
Documentation = "https://lingchu.hikarilink.org"
Repository = "https://github.com/hikarilink/lingchu-bot.git"
Issues = "https://github.com/hikarilink/lingchu-bot/issues"

[project.optional-dependencies]
webui = ["nicegui>=3.10.0"]

[dependency-groups]
dev = [
    { include-group = "script" },
    { include-group = "test" },
    { include-group = "docs" },
    { include-group = "lint" },
    { include-group = "git" },
    { include-group = "gui" },
]
gui = ["nicegui>=3.10.0"]
script = ["poethepoet>=0.44.0"]
git = [
    "bump-my-version>=1.3.0",
    "commitlint>=1.13.3",
    "husky>=0.1.7",
    "prek>=0.3.8",
]
docs = ["zensical>=0.0.17"]
lint = ["ruff>=0.15.10", "pyright>=1.1.407", "ty>=0.0.32"]
test = [
    "nonebug>=0.4.3",
    "pytest>=8.4.2",
    "pytest-asyncio>=1.3.0",
    "pytest-check>=2.8.0",
    "pytest-clarity>=1.0.1",
    "pytest-cov>=7.1.0",
    "pytest-fastapi>=0.1.0",
    "pytest-html>=4.2.0",
    "pytest-httpx>=0.36.2",
    "pytest-icdiff>=0.9",
    "pytest-instafail>=0.5.0",
    "pytest-json>=0.4.0",
    "pytest-mock>=3.15.1",
    "pytest-xdist>=3.8.0",
    "pytest-repeat>=0.9.4",
    "pytest-rerunfailures>=16.1",
    "pytest-rich>=0.2.0",
    "pytest-socket>=0.7.0",
    "pytest-sqlalchemy>=0.3.0",
    "pytest-sugar>=1.1.1",
    "pytest-timeout>=2.4.0",
    "respx>=0.23.1",
]

[tool.PEP639.Standards]
license-expression = "LGPL-3.0-or-later AND GFDL-1.3-or-later"

[tool.poe.tasks]


[tool.bumpversion]
current_version = "0.1.0"
commit = true
message = "release: bump vesion from {current_version} to {new_version}"
tag = true

[[tool.bumpversion.files]]
filename = "uv.lock"
search = "name = \"nonebot-plugin-template\"\nversion = \"{current_version}\""
replace = "name = \"nonebot-plugin-template\"\nversion = \"{new_version}\""

[tool.nonebot]
plugin_dirs = [
    "src/plugins", # 这个目录是给用户放置nonebot2插件的，用户可以在这里放置nonebot2插件，nonebot2插件会覆盖同名的项目插件。
    # "src/builtin_plugins",      # 这个目录是给项目本身的插件的，项目本身的插件会放在这里，用户不应该修改这个目录下的插件。
    # "src/local_plugins",        # 这个目录是给用户放置本地插件的，用户可以在这里放置自己编写的本地插件，本地插件会覆盖同名的项目插件。
    # "src/webui_plugins",        # 这个目录是给项目本身的 WebUI 插件的，项目本身的 WebUI 插件会放在这里，用户不应该修改这个目录下的插件。
    # "src/third_party_plugins",  # 这个目录是给项目本身的第三方插件的，项目本身的第三方插件会放在这里，用户不应该修改这个目录下的插件。
    # "src/experimental_plugins", # 这个目录是给项目本身的实验性插件的，项目本身的实验性插件会放在这里，用户不应该修改这个目录下的插件。
    # "src/legacy_plugins",       # 这个目录是给项目本身的遗留插件的，项目本身的遗留插件会放在这里，用户不应该修改这个目录下的插件。
    # "src/services_plugins",     # 这个目录是给项目本身的服务插件的，项目本身的服务插件会放在这里，用户不应该修改这个目录下的插件。
]

[tool.nonebot.adapters]
nonebot-adapter-onebot = [
    { name = "OneBot V11", module_name = "nonebot.adapters.onebot.v11" },
]
nonebot-adapter-milky = [
    { name = "Milky", module_name = "nonebot.adapters.milky" },
]
nonebot-adapter-github = [
    { name = "GitHub", module_name = "nonebot.adapters.github" },
]
nonebot-adapter-telegram = [
    { name = "Telegram", module_name = "nonebot.adapters.telegram" },
]
nonebot-adapter-discord = [
    { name = "Discord", module_name = "nonebot.adapters.discord" },
]
"@local" = []

[tool.nonebot.plugins]
nonebot-plugin-apscheduler = ["nonebot_plugin_apscheduler"]
nonebot-plugin-localstore = ["nonebot_plugin_localstore"]
nonebot-plugin-orm = ["nonebot_plugin_orm"]
nonebot-plugin-alconna = ["nonebot_plugin_alconna"]
nonebot-plugin-uninfo = ["nonebot_plugin_uninfo"]
nonebot-plugin-htmlkit = ["nonebot_plugin_htmlkit"]
"@local" = []

[tool.ruff]
line-length = 88
target-version = "py313"

[tool.ruff.format]
line-ending = "lf"

[tool.ruff.lint]
# For more rules, see https://docs.astral.sh/ruff/rules/.
select = [
    "F",     # Pyflakes
    "W",     # pycodestyle warnings
    "E",     # pycodestyle errors
    "I",     # isort
    "C90",   # mccabe
    "N",     # pep8-naming
    "PL",    # pylint
    "UP",    # pyupgrade
    "YTT",   # flake8-2020
    "ANN",   # flake8-annotations
    "ASYNC", # flake8-async
    "BLE",   # flake8-blind-except
    "FBT",   # flake8-boolean-trap
    "B",     # flake8-bugbear
    "A",     # flake8-builtins
    "COM",   # flake8-commas
    "C4",    # flake8-comprehensions
    "DTZ",   # flake8-datetimez
    "T10",   # flake8-debugger
    "ICN",   # flake8-import-conventions
    "PIE",   # flake8-pie
    "T20",   # flake8-print
    "PYI",   # flake8-pyi
    "Q",     # flake8-quotes
    "RSE",   # flake8-raise
    "RET",   # flake8-return
    "SIM",   # flake8-simplify
    "SLOT",  # flake8-slots
    "TID",   # flake8-tidy-imports
    "TC",    # flake8-type-checking
    "ARG",   # flake8-unused-arguments
    "PTH",   # flake8-use-pathlib
    # "ERA",   # eradicate
    "FAST", # FastAPI
    "PERF", # Perflint
    "PGH",  # pygrep-hooks
    "FURB", # refurb
    "TRY",  # tryceratops
    "RUF",  # Ruff-specific rules
]
ignore = [
    "E402",  # module-import-not-at-top-of-file  # nonebot2 require() violates this
    "B008",  # function-call-in-default-argument  # nonebot2 Depends() without Annotated violates this
    "UP037", # quoted-annotation
    # "RUF001",  # ambiguous-unicode-character-string
    # "RUF002",  # ambiguous-unicode-character-docstring
    # "RUF003",  # ambiguous-unicode-character-comment
    # "ANN201",  # missing-return-type-undocumented-public-function
    "ANN202",  # missing-return-type-private-function
    "ANN401",  # any-type
    "COM812",  # missing-trailing-comma
    "PLC0415", # import-outside-top-level
    "TID252",  # prefer-absolute-imports
]
allowed-confusables = [
    "，",
    "。",
    "“",
    "”",
    "：",
    "；",
    "？",
    "！",
    "【",
    "】",
    "《",
    "》",
    "…",
    "—",
    "（",
    "）",
    "、",
]

[tool.ruff.lint.pyupgrade]
keep-runtime-typing = true

[tool.pyright]
# For Pylance/Pyright configurations, see https://microsoft.github.io/pyright/#/configuration.
pythonVersion = "3.13"
pythonPlatform = "All"
typeCheckingMode = "standard"

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"

# TODO: add build system configuration
# [build-system]
# requires = ["uv_build>=0.11.8,<0.12"]
# build-backend = "uv_build"

[[tool.uv.index]]
name = "aliyun"
url = "https://mirrors.aliyun.com/pypi/simple/"

