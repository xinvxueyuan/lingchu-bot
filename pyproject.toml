[project]
name = "nonebot-plugin-lingchu-bot"
version = "0.0.0.dev32"
# dynamic = ["version"]
description = "由NoneBot2驱动，符合 PEP8 规范的管理机器人"
keywords = ["nonebot2", "nonebot", "bot", "qq", "milky", "group-management"]
readme = "README.md"
license = "LGPL-3.0-or-later AND GFDL-1.3-or-later"
license-files = ["LICENSE-code", "LICENSE-docs", "Repository-Policy.md"]
requires-python = ">=3.13, <3.14"
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Environment :: Plugins",
    "Framework :: AsyncIO",
    "Intended Audience :: Developers",
    "Natural Language :: Chinese (Simplified)",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.13",
    "Topic :: Communications :: Chat",
]
authors = [{ name = "xinvxueyuan", email = "xinvxueyuan@yeah.net" }]
maintainers = [{ name = "xinvxueyuan", email = "xinvxueyuan@yeah.net" }]
dependencies = [
    "psutil>=7.2.2",
    "jinja2>=3.1.6",
    "nonebot2[fastapi]>=2.5.0",
    "nonebot2[httpx]>=2.4.4",
    "nonebot2[websockets]>=2.4.4",
    "nonebot-plugin-apscheduler>=0.5.0",
    "nonebot-plugin-localstore>=0.7.4",
    "nonebot-plugin-orm[aiosqlite]>=0.8.3",
    "nonebot-plugin-alconna>=0.62.0",
    "nonebot-adapter-onebot>=2.4.6",
    "nonebot-adapter-milky>=1.2.0",
    # "nonebot-adapter-github>=0.6.0",
    # "nonebot-adapter-discord>=1.1.3",
    # "nonebot-adapter-telegram>=0.1.0b20",
    "nonebot-plugin-docs>=2.5.0",
    # "nonebot-plugin-sentry>=2.0.0",
    "aiofiles>=25.1.0",
    "json5>=0.14.0",
    "babel>=2.18.0",
    "nonebot-plugin-htmlkit>=0.1.0rc5",
    "rtoml>=0.13.0",
    "arrow>=1.4.0",
    "typer>=0.25.1",
    "nonebot-plugin-wait-a-minute>=0.5.0",
    "nicegui>=3.10.0",
    "openai>=2.38.0",
]

[project.urls]
Homepage = "https://lingchu.zone.id/"
Documentation = "https://lingchu.zone.id/"
Repository = "https://github.com/xinvxueyuan/lingchu-bot.git"
Issues = "https://github.com/xinvxueyuan/lingchu-bot/issues"

[project.optional-dependencies]
webui = ["nicegui>=3.10.0"]

[dependency-groups]
dev = [
    { include-group = "script" },
    { include-group = "test" },
    { include-group = "lint" },
    { include-group = "git" },
    { include-group = "gui" },
]
gui = ["nicegui>=3.10.0"]
script = ["poethepoet>=0.44.0"]
git = [
    # "bump-my-version>=1.3.0",
    "commitlint>=1.13.3",
    "prek>=0.3.8",
]
lint = ["ruff>=0.15.10", "pyright>=1.1.407", "ty>=0.0.32"]
test = [
    "nonebug>=0.4.3",
    "pytest>=8.4.2",
    "pytest-asyncio>=1.3.0",
    "pytest-check>=2.8.0",
    "pytest-clarity>=1.0.1",
    "pytest-cov>=7.1.0",
    "pytest-fastapi>=0.1.0",
    "pytest-html>=4.2.0",
    "pytest-httpx>=0.36.2",
    "pytest-icdiff>=0.9",
    "pytest-instafail>=0.5.0",
    "pytest-json>=0.4.0",
    "pytest-mock>=3.15.1",
    "pytest-xdist>=3.8.0",
    "pytest-repeat>=0.9.4",
    "pytest-rerunfailures>=16.1",
    "pytest-rich>=0.2.0",
    "pytest-socket>=0.7.0",
    "pytest-sqlalchemy>=0.3.0",
    "pytest-sugar>=1.1.1",
    "pytest-timeout>=2.4.0",
    "respx>=0.23.1",
]


# [tool.poe.tasks]

[tool.nonebot]
plugin_dirs = ["src/plugins"]

[tool.nonebot.adapters]
nonebot-adapter-onebot = [
    { name = "OneBot V11", module_name = "nonebot.adapters.onebot.v11" },
    { name = "OneBot V12", module_name = "nonebot.adapters.onebot.v12" },
]
nonebot-adapter-milky = [
    { name = "Milky", module_name = "nonebot.adapters.milky" },
]
# nonebot-adapter-github = [
#     { name = "GitHub", module_name = "nonebot.adapters.github" },
# ]
# nonebot-adapter-telegram = [
#     { name = "Telegram", module_name = "nonebot.adapters.telegram" },
# ]
# nonebot-adapter-discord = [
#     { name = "Discord", module_name = "nonebot.adapters.discord" },
# ]
"@local" = []

[tool.nonebot.plugins]
nonebot-plugin-apscheduler = ["nonebot_plugin_apscheduler"]
nonebot-plugin-localstore = ["nonebot_plugin_localstore"]
nonebot-plugin-orm = ["nonebot_plugin_orm"]
nonebot-plugin-alconna = ["nonebot_plugin_alconna"]
nonebot-plugin-htmlkit = ["nonebot_plugin_htmlkit"]
nonebot-plugin-docs = ["nonebot_plugin_docs"]
# nonebot-plugin-sentry = ["nonebot_plugin_sentry"]
"@local" = []

[tool.ruff]
line-length = 88
target-version = "py313"

[tool.ruff.format]
line-ending = "lf"

[tool.ruff.lint]
# For more rules, see https://docs.astral.sh/ruff/rules/.
select = [
    "F",     # Pyflakes
    "W",     # pycodestyle warnings
    "E",     # pycodestyle errors
    "I",     # isort
    "C90",   # mccabe
    "N",     # pep8-naming
    "PL",    # pylint
    "UP",    # pyupgrade
    "YTT",   # flake8-2020
    "ANN",   # flake8-annotations
    "ASYNC", # flake8-async
    "BLE",   # flake8-blind-except
    "FBT",   # flake8-boolean-trap
    "B",     # flake8-bugbear
    "A",     # flake8-builtins
    "COM",   # flake8-commas
    "C4",    # flake8-comprehensions
    "DTZ",   # flake8-datetimez
    "T10",   # flake8-debugger
    "ICN",   # flake8-import-conventions
    "PIE",   # flake8-pie
    "T20",   # flake8-print
    "PYI",   # flake8-pyi
    "Q",     # flake8-quotes
    "RSE",   # flake8-raise
    "RET",   # flake8-return
    "SIM",   # flake8-simplify
    "SLOT",  # flake8-slots
    "TID",   # flake8-tidy-imports
    "TC",    # flake8-type-checking
    "ARG",   # flake8-unused-arguments
    "PTH",   # flake8-use-pathlib
    # "ERA",   # eradicate
    "FAST", # FastAPI
    "PERF", # Perflint
    "PGH",  # pygrep-hooks
    "FURB", # refurb
    "TRY",  # tryceratops
    "RUF",  # Ruff-specific rules
]
ignore = [
    "E402",  # module-import-not-at-top-of-file  # nonebot2 require() violates this
    "B008",  # function-call-in-default-argument  # nonebot2 Depends() without Annotated violates this
    "UP037", # quoted-annotation
    # "RUF001",  # ambiguous-unicode-character-string
    # "RUF002",  # ambiguous-unicode-character-docstring
    # "RUF003",  # ambiguous-unicode-character-comment
    # "ANN201",  # missing-return-type-undocumented-public-function
    "ANN202",  # missing-return-type-private-function
    "ANN401",  # any-type
    "COM812",  # missing-trailing-comma
    "PLC0415", # import-outside-top-level
    "TID252",  # prefer-absolute-imports
]
allowed-confusables = [
    "，",
    "。",
    "“",
    "”",
    "：",
    "；",
    "？",
    "！",
    "【",
    "】",
    "《",
    "》",
    "…",
    "—",
    "（",
    "）",
    "、",
]

[tool.ruff.lint.pyupgrade]
keep-runtime-typing = true

[tool.pyright]
# For Pylance/Pyright configurations, see https://microsoft.github.io/pyright/#/configuration.
pythonVersion = "3.13"
pythonPlatform = "All"
typeCheckingMode = "standard"

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
pythonpath = ["src"]

# TODO: add build system configuration
[build-system]
requires = ["uv_build>=0.11.8,<0.12"]
build-backend = "uv_build"


[tool.uv.build-backend]
module-name = "nonebot_plugin_lingchu_bot"
module-root = "src/plugins"
# version = { source = "git" }

[[tool.uv.index]]
name = "aliyun"
url = "https://mirrors.aliyun.com/pypi/simple/"

