[project]
docs_dir = "docs"
site_dir = "site"
site_name = "Lingchu Bot 文档"
site_description = "基于 NoneBot2 的 Lingchu Bot 项目文档"
site_author = "xinvxueyuan"
site_url = "https://lingchu.zone.id/"
repo_url = "https://github.com/xinvxueyuan/lingchu-bot"
edit_uri = "edit/main/docs/"
copyright = """
Copyright &copy; 2025 ~ Present
<a href="https://github.com/xinvxueyuan">xinvxueyuan</a>.
Made with GitHub Pages.
"""

nav = [
    { "首页" = "index.md" },
    { "用户指南" = [
        { "概览" = "user-guide/overview.md" },
        { "快速开始" = "user-guide/quick-start.md" },
        { "命令与群管理" = "user-guide/commands.md" },
        { "配置" = "user-guide/configuration.md" },
        { "故障排除" = "user-guide/troubleshooting.md" },
    ] },
    { "开发指南" = [
        { "架构概览" = "developer-guide/introduction.md" },
        { "开发流程" = "developer-guide/workflow.md" },
        { "提交规范" = "developer-guide/commit-style.md" },
        { "测试与 CI" = "developer-guide/testing-ci.md" },
        { "GitNexus 工作流" = "developer-guide/gitnexus.md" },
    ] },
    { "项目政策" = "project-policy.md" },
]

[project.theme]
favicon = "assets/images/favicon.png"
language = "zh"
features = [
    "announce.dismiss",
    "content.action.edit",
    "content.action.view",
    "content.code.copy",
    "content.code.select",
    "header.autohide",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.path",
    "navigation.prune",
    "navigation.sections",
    "navigation.tabs.sticky",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "切换到暗色模式"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "切换到亮色模式"

[project.theme.font]
text = "Inter"
code = "Jetbrains Mono"

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.extra.social]]
name = "GitHub"
icon = "fontawesome/brands/github"
link = "https://github.com/xinvxueyuan/lingchu-bot"

[project.extra.consent]
title = "Cookie 许可"
description = "我们使用 Cookie 记住偏好并帮助改进文档体验。"

[project.extra]
generator = false
