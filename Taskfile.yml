# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  MD_GLOB: >-
    "apps/**/*.md" "packages/**/*.md" "!**/node_modules/**" "!**/out/**"
    "README.md" "CHANGELOG.md" "CONTRIBUTING.md" "CODE_OF_CONDUCT.md" ".github/**/*.md"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  install:
    desc: Install all dependencies
    cmds:
      - uv sync
      - pnpm install

  up:
    desc: Update all dependencies
    cmds:
      - uv sync --upgrade
      - pnpm update

  check:
    desc: Run all static checks (lint + format + markdown + type check)
    cmds:
      - uv run -m ruff check . --output-format=github
      - uv run -m ruff format --check .
      - pnpm exec markdownlint-cli2 {{.MD_GLOB}}
      - pnpm turbo run lint
      - uv run -m pyright .
      - uv run -m ty check --output-format github
      - pnpm turbo run check-types

  test:
    desc: Run all tests (Python + Docs)
    cmds:
      - uv run -m pytest {{.CLI_ARGS}}
      - pnpm --filter docs test

  format:
    desc: Format all code
    cmds:
      - uv run -m ruff format .
      - pnpm exec markdownlint-cli2 --fix {{.MD_GLOB}}

  fix:
    desc: Auto-fix all linting and type issues
    cmds:
      - uv run -m ruff check --fix .
      - uv run -m ruff format .
      - uv run -m ty check --fix . || true
      - pnpm exec markdownlint-cli2 --fix {{.MD_GLOB}}

  build:
    desc: Build all workspaces
    cmds:
      - pnpm turbo run build

  ci:
    desc: Run the full local CI sequence
    cmds:
      - task: check
      - task: test
      - task: build

  ci:static:
    desc: "[CI] Static analysis checks"
    cmds:
      - uv run -m ruff check . --output-format=github
      - uv run -m ruff format --check .
      - pnpm exec markdownlint-cli2 {{.MD_GLOB}}
      - pnpm turbo run lint

  ci:typecheck:
    desc: "[CI] Type checks"
    cmds:
      - uv run -m pyright .
      - uv run -m ty check --output-format github
      - pnpm turbo run check-types

  ci:test:
    desc: "[CI] Tests with report output"
    cmds:
      - uv run -m pytest --junitxml=test-results/pytest.xml
      - pnpm --filter docs test

  ci:fix:
    desc: "[CI] Auto-fix and format"
    cmds:
      - uv run -m ruff check --fix .
      - uv run -m ruff format .
      - uv run -m ty check --fix . || true
      - pnpm exec markdownlint-cli2 --fix {{.MD_GLOB}}

  ci:build:
    desc: "[CI] Build distribution artifacts"
    cmds:
      - uv build --clear
      - pnpm turbo run build

  ci:docs:
    desc: "[CI] Docs-only check, test and build (no Python toolchain required)"
    cmds:
      - pnpm turbo run lint
      - pnpm --filter docs test
      - pnpm turbo run build

  ci:version:bump:
    desc: "[CI] Bump development version and emit GitHub Actions outputs"
    cmds:
      - |
        set -euo pipefail

        version_json="$(uv version --bump dev --output-format json --no-sync)"
        new_version="$(python -c 'import json, sys; print(json.load(sys.stdin)["version"])' <<< "$version_json")"

        echo "new_version=$new_version" >> "$GITHUB_OUTPUT"
        echo "$version_json"
        uv version --bump dev --dry-run --short --output-format text | xargs echo "Bumping version to:"

  ci:version:write-config:
    desc: "[CI] Write version into config.py"
    requires:
      vars: [VERSION, CONFIG_PATH]
    cmds:
      - |
        set -euo pipefail

        python - <<'PY'
        from pathlib import Path
        import os
        import re

        version = os.environ["VERSION"]
        path = Path(os.environ["CONFIG_PATH"])

        text = path.read_text(encoding="utf-8")
        new_text, count = re.subn(
            r'core_version:\s*str\s*=\s*"[^"]*"',
            f'core_version: str = "{version}"',
            text,
            count=1,
        )

        if count != 1:
            raise RuntimeError("未找到唯一的 core_version 字段")

        path.write_text(new_text, encoding="utf-8")
        PY

  ci:version:commit-tag:
    desc: "[CI] Commit version changes and create release tag"
    requires:
      vars: [VERSION]
    cmds:
      - |
        set -euo pipefail

        version="{{.VERSION}}"
        tag="v${version}"

        export HUSKY=0

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        git add pyproject.toml uv.lock src/plugins/nonebot_plugin_lingchu_bot/core/config.py 2>/dev/null \
        || git add pyproject.toml src/plugins/nonebot_plugin_lingchu_bot/core/config.py uv.lock

        if ! git diff --cached --quiet; then
            git commit --no-verify -m "🔖 chore: bump version to ${version} [skip ci]"
            git push origin "HEAD:${GITHUB_REF_NAME}"
        fi

        if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists locally; skipping tag creation."
        elif git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists on origin; skipping tag creation."
        else
            git tag "$tag"
            git push origin "$tag"
        fi

  i18n:
    desc: Extract, update and compile i18n messages
    cmds:
      - uv run pybabel extract -F src/plugins/nonebot_plugin_lingchu_bot/i18n/babel.cfg -o src/plugins/nonebot_plugin_lingchu_bot/i18n/messages.pot src/plugins/nonebot_plugin_lingchu_bot
      - uv run pybabel update -i src/plugins/nonebot_plugin_lingchu_bot/i18n/messages.pot -d src/plugins/nonebot_plugin_lingchu_bot/i18n/locales -D messages
      - uv run pybabel compile -d src/plugins/nonebot_plugin_lingchu_bot/i18n/locales -D messages
