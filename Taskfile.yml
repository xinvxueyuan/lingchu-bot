# yaml-language-server: $schema=https://taskfile.dev/schema.json
#
# Task dependency graph (maintainer reference — kept in sync with .github/workflows/*.yml):
#
#   install                       → uv sync, pnpm install
#   up                            → uv sync --upgrade, pnpm update
#   check                         → ruff check, ruff format check, markdownlint, turbo lint, pyright, ty, turbo check-types
#   test                          → pytest, docs test
#   format                        → ruff format, prettier, markdownlint --fix
#   fix                           → ruff check --fix, ruff format, prettier, ty --fix, markdownlint --fix
#   build                         → turbo build
#   ci                            → check → test → build
#   ci:static                     → ruff check, ruff format check, markdownlint, turbo lint          [CI: 🧪-python.yml]
#   ci:typecheck                  → pyright, ty, turbo check-types                                 [local-only; CI runs pyright/ty inline]
#   ci:test                       → pytest --junitxml, docs test                                    [local-only; CI runs pytest inline]
#   ci:fix                        → ruff check --fix, ruff format, prettier, ty --fix, markdownlint --fix     [CI: 🧪-python.yml]
#   ci:build                      → uv build, turbo build                                          [CI: 👷-ci-builds.yml, 🚀-release.yml]
#   ci:docs                       → turbo lint check-types, docs lint:links, docs test, turbo build [local-only; CI runs turbo inline]
#   smoke                         → docker compose --profile smoke up                               [docs: CONTRIBUTING.md]
#   ci:smoke                      → docker compose --profile smoke run (JUnit report)              [local-only; CI invokes docker compose inline]
#
#   Version pipeline (push to main/dev* via 👷-ci-builds.yml versioned-build job):
#     ci:version:bump
#       → ci:version:precheck   (PEP 440, > all tags, source consistency, no duplicate tag)
#       → ci:version:write-config  (writes VERSION into core/config.py + package.json)
#       → ci:version:postcheck  (calls release:verify-version + dev release semantics)
#       → ci:build              (uv build + turbo build)
#       → actions/attest-build-provenance (SLSA, in workflow — not a task)
#       → ci:version:tag-only    (creates + pushes git tag)
#
#   Release pipeline (🚀-release.yml):
#     release:verify-version    (pyproject.toml / package.json / core/config.py consistency)  [CI: 🚀-release.yml, called by ci:version:postcheck]
#     ci:version:tag-only       (tag only)                                                     [CI: 🚀-release.yml]
#     release:prepare           (local: branch + ci:version:write-config + release:verify-version)  [docs: CONTRIBUTING.md]
#     release:publish           (local: push releases/<version> branch)                          [docs: CONTRIBUTING.md]
#     ci:version:from-tag       (restore version from git tag into core/config.py)              [local-only; not invoked by current CI]
#
#   i18n                          → pybabel extract / update / compile                            [docs: AGENTS.md, CONTRIBUTING.md, README]
#   gitmoji                       → display gitmoji + Conventional Commits cheatsheet           [docs: CONTRIBUTING.md]
#
# Orphan / local-only tasks (not directly invoked by CI or docs; retained for local parity):
#   ci:typecheck, ci:test, ci:docs, ci:smoke, ci:version:from-tag, up, format, fix

version: "3"

# vars:
  # markdownlint-cli2 范围由根目录 .markdownlint-cli2.jsonc 统一驱动（globs + ignores + config）
  # 所有调用方无参调用 markdownlint-cli2，避免多处维护 glob 列表

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  install:
    desc: Install all dependencies
    cmds:
      - uv sync --all-extras
      - pnpm install

  up:
    desc: Update all dependencies
    cmds:
      - uv sync --all-extras --upgrade
      - pnpm update

  check:
    desc: Run all static checks (lint + format + markdown + type check)
    cmds:
      - uv run -m ruff check . --output-format=github
      - uv run -m ruff format --check .
      - pnpm exec markdownlint-cli2
      - pnpm turbo run lint --log-order=stream
      - uv run -m pyright
      - uv run -m ty check --output-format github
      - pnpm turbo run check-types

  test:
    desc: Run all tests (Python + Docs)
    cmds:
      - uv run -m pytest -n auto --dist=worksteal {{.CLI_ARGS}}
      - pnpm --filter docs test

  format:
    desc: Format all code
    cmds:
      - uv run -m ruff format .
      - pnpm exec prettier --write "apps/docs/src/**/*.{ts,tsx,css,json}"
      - pnpm exec markdownlint-cli2 --fix

  fix:
    desc: Auto-fix all linting and type issues
    cmds:
      - uv run -m ruff check --fix .
      - uv run -m ruff format .
      - pnpm exec prettier --write "apps/docs/src/**/*.{ts,tsx,css,json}"
      - uv run -m ty check --fix .
      - pnpm exec markdownlint-cli2 --fix

  build:
    desc: Build all workspaces
    cmds:
      - pnpm turbo run build

  ci:
    desc: Run the full local CI sequence
    cmds:
      - task: check
      - task: test
      - task: build

  ci:static:
    desc: "[CI] Static analysis checks"
    cmds:
      - uv run -m ruff check . --output-format=github
      - uv run -m ruff format --check .
      - pnpm exec markdownlint-cli2
      - pnpm turbo run lint

  ci:typecheck:
    desc: "[CI] Type checks"
    cmds:
      - uv run -m pyright
      - uv run -m ty check --output-format github
      - pnpm turbo run check-types

  ci:test:
    desc: "[CI] Tests with report output"
    cmds:
      - uv run -m pytest -n auto --dist=worksteal --junitxml=test-results/pytest.xml
      - pnpm --filter docs test

  ci:fix:
    desc: "[CI] Auto-fix and format"
    cmds:
      - uv run -m ruff check --fix .
      - uv run -m ruff format .
      - pnpm exec prettier --write "apps/docs/src/**/*.{ts,tsx,css,json}"
      - uv run -m ty check --fix .
      - pnpm exec markdownlint-cli2 --fix

  ci:build:
    desc: "[CI] Build distribution artifacts"
    cmds:
      - uv build --clear
      - pnpm turbo run build

  ci:docs:
    desc: "[CI] Docs-only check, test and build (no Python toolchain required)"
    cmds:
      - pnpm turbo run lint check-types
      - pnpm --filter docs lint:links
      - pnpm --filter docs test
      - pnpm turbo run build

  smoke:
    desc: Run the smoke test suite locally with Docker Compose
    cmds:
      - docker compose --profile smoke up --build --abort-on-container-exit smoke-test

  ci:smoke:
    desc: "[CI] Run smoke tests and emit a JUnit XML report"
    cmds:
      - mkdir -p test-results/smoke
      - docker compose --profile smoke run --rm --build --user root -v ./test-results/smoke:/reports -e SMOKE_TEST_RESULTS_XML=/reports/smoke-test-results.xml smoke-test

  ci:version:bump:
    desc: "[CI] Bump development version and emit GitHub Actions outputs"
    vars:
      BUMP_LEVEL: patch
      BUMP_PRERELEASE: dev
    cmds:
      - |
        set -euo pipefail

        # Sync version from latest remote tag so the version advances across runs
        git fetch --tags --quiet
        latest_tag="$(git tag --sort=-v:refname --list 'v[0-9]*' | head -1)"
        if [ -n "$latest_tag" ]; then
          tag_version="${latest_tag#v}"
          uv version "$tag_version" --frozen
        fi

        # Determine bump strategy:
        # - release tags need <level>+<prerelease> (e.g. --bump patch --bump beta)
        # - pre-release tags of the same type just bump the pre-release (e.g. --bump beta)
        # - pre-release tags of a different type need <level>+<prerelease>
        # - stable clears the pre-release component
        bump_level="{{.BUMP_LEVEL}}"
        bump_prerelease="{{.BUMP_PRERELEASE}}"
        if [ "$bump_prerelease" = "stable" ]; then
          set -- --bump stable
        elif [ -n "$latest_tag" ] && [[ "$tag_version" != *dev* ]] && [[ "$tag_version" != *a* ]] && [[ "$tag_version" != *b* ]] && [[ "$tag_version" != *rc* ]]; then
          # Latest tag is a stable release — must bump level + prerelease
          set -- --bump "$bump_level" --bump "$bump_prerelease"
        else
          # Latest tag is already a pre-release — just bump the prerelease component
          set -- --bump "$bump_prerelease"
        fi

        version_json="$(uv version "$@" --output-format json --frozen)"
        new_version="$(python -c 'import json, sys; print(json.load(sys.stdin)["version"])' <<< "$version_json")"

        echo "new_version=$new_version" >> "$GITHUB_OUTPUT"
        echo "$version_json"
        echo "Bumping version to: $new_version (level: $bump_level, prerelease: $bump_prerelease)"

  ci:version:precheck:
    desc: "[CI] Pre-bump validation: verify new version is valid and greater than all existing tags"
    requires:
      vars: [NEW_VERSION]
    env:
      NEW_VERSION: "{{.NEW_VERSION}}"
    cmds:
      - |
        set -euo pipefail
        uv run python scripts/ci_version_precheck.py

  ci:version:postcheck:
    desc: "[CI] Post-bump validation: verify version is synchronized and valid"
    requires:
      vars: [VERSION]
    env:
      VERSION: "{{.VERSION}}"
    cmds:
      - task: release:verify-version
        vars:
          VERSION: "{{.VERSION}}"
      - |
        set -euo pipefail
        uv run python scripts/ci_version_postcheck.py

  ci:version:write-config:
    desc: "[CI] Write version into config.py and package.json"
    requires:
      vars: [VERSION, CONFIG_PATH]
    env:
      VERSION: "{{.VERSION}}"
      CONFIG_PATH: "{{.CONFIG_PATH}}"
    cmds:
      - |
        set -euo pipefail
        python scripts/ci_version_write.py

  ci:version:tag-only:
    desc: "[CI] Create release tag only (no commit push to avoid branch divergence)"
    requires:
      vars: [VERSION]
    cmds:
      - |
        set -euo pipefail

        version="{{.VERSION}}"
        tag="v${version}"

        if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists locally; skipping tag creation."
        elif git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists on origin; skipping tag creation."
        else
            git tag "$tag"
            git push origin "$tag"
        fi

  ci:version:from-tag:
    desc: "[CI] Restore version from a git tag into config.py (for release builds)"
    requires:
      vars: [TAG, CONFIG_PATH]
    cmds:
      - |
        set -euo pipefail

        version="{{.TAG}}"
        version="${version#v}"

        export VERSION="$version" CONFIG_PATH="{{.CONFIG_PATH}}"
        python scripts/ci_version_from_tag.py

  release:verify-version:
    desc: Verify release version is synchronized across package files
    requires:
      vars: [VERSION]
    env:
      VERSION: "{{.VERSION}}"
    cmds:
      - |
        set -euo pipefail
        python scripts/release_verify_version.py

  release:prepare:
    desc: Prepare a release branch and synchronize version files
    requires:
      vars: [VERSION]
    cmds:
      - |
        set -euo pipefail
        version="{{.VERSION}}"
        branch="releases/${version}"
        git switch -c "$branch"
        uv version "$version" --frozen
        VERSION="$version" CONFIG_PATH="src/plugins/nonebot_plugin_lingchu_bot/core/config.py" task ci:version:write-config
        task release:verify-version VERSION="$version"
        echo "Prepared ${branch}. Review docs/changelog, then push to publish."

  release:publish:
    desc: Push a prepared releases/<version> branch to trigger release workflow
    requires:
      vars: [VERSION]
    cmds:
      - git push origin "releases/{{.VERSION}}"

  i18n:
    desc: Extract, update and compile i18n messages
    cmds:
      - uv run pybabel extract -F src/plugins/nonebot_plugin_lingchu_bot/i18n/babel.cfg -o src/plugins/nonebot_plugin_lingchu_bot/i18n/messages.pot src/plugins/nonebot_plugin_lingchu_bot
      - uv run pybabel update -i src/plugins/nonebot_plugin_lingchu_bot/i18n/messages.pot -d src/plugins/nonebot_plugin_lingchu_bot/i18n/locales -D messages
      - uv run pybabel compile -d src/plugins/nonebot_plugin_lingchu_bot/i18n/locales -D messages

  gitmoji:
    desc: 显示 gitmoji + Conventional Commits 中文速查表
    cmds:
      - |
        cat <<'EOF'
        ╔══════════════════════════════════════════════════════════════╗
        ║            gitmoji + Conventional Commits 速查表            ║
        ╠══════════════════════════════════════════════════════════════╣
        ║  格式: <gitmoji> <type>(<scope>)?: <subject>                ║
        ║  示例: ✨ feat: 新增功能                                    ║
        ║        🐛 fix(auth): 修复令牌过期                           ║
        ╠══════════════════════════════════════════════════════════════╣
        ║  Emoji  Type        说明                                   ║
        ╠══════════════════════════════════════════════════════════════╣
        ║  ✨     feat        引入新功能                              ║
        ║  🐛     fix         修复缺陷                                ║
        ║  📝     docs        新增或更新文档                          ║
        ║  🎨     style       改善代码结构/格式(不影响逻辑)           ║
        ║  ♻️     refactor    重构代码(既非新功能也非修缺陷)          ║
        ║  ⚡️     perf        提升性能                                ║
        ║  ✅     test        新增、更新或通过测试                    ║
        ║  👷     build       新增或更新 CI 构建系统                  ║
        ║  💚     ci          修复 CI 构建                           ║
        ║  🔧     chore       新增或更新配置文件                      ║
        ║  ⏪️     revert      回退变更                                ║
        ╠══════════════════════════════════════════════════════════════╣
        ║  其他常用 gitmoji                                           ║
        ╠══════════════════════════════════════════════════════════════╣
        ║  🚑️     紧急修复(热补丁)                                   ║
        ║  🚀     部署相关                                            ║
        ║  💄     新增或更新 UI 和样式文件                            ║
        ║  🎉     初始化项目                                          ║
        ║  🔒️     修复安全或隐私问题                                  ║
        ║  🔐     新增或更新密钥                                      ║
        ║  🔖     发布/版本标签                                       ║
        ║  🚨     修复编译器/linter 警告                              ║
        ║  🚧     工作进行中                                          ║
        ║  ⬇️     降级依赖                                            ║
        ║  ⬆️     升级依赖                                            ║
        ║  📌     锁定依赖到特定版本                                  ║
        ║  📈     新增或更新分析/追踪代码                             ║
        ║  ➕     新增依赖                                            ║
        ║  ➖     移除依赖                                            ║
        ║  🔨     新增或更新开发脚本                                  ║
        ║  🌐     国际化与本地化                                      ║
        ║  ✏️     修复拼写错误                                        ║
        ║  💩     编写需要改进的劣质代码                              ║
        ║  🔀     合并分支                                            ║
        ║  📦️     新增或更新编译文件或包                               ║
        ║  👽️     因外部 API 变更而更新代码                           ║
        ║  🚚     移动或重命名资源                                    ║
        ║  📄     新增或更新许可证                                    ║
        ║  💥     引入破坏性变更                                      ║
        ║  🍱     新增或更新资源文件                                  ║
        ║  ♿️     改善无障碍访问                                      ║
        ║  💡     新增或更新源码中的注释                              ║
        ║  🍻     醉酒编写代码                                        ║
        ║  💬     新增或更新文本与字面量                               ║
        ║  🗃️     执行数据库相关变更                                   ║
        ║  🔊     新增或更新日志                                      ║
        ║  🔇     移除日志                                            ║
        ║  👥     新增或更新贡献者                                    ║
        ║  🚸     改善用户体验/可用性                                  ║
        ║  🏗️     进行架构变更                                         ║
        ║  📱     处理响应式设计                                       ║
        ║  🤡     模拟相关                                            ║
        ║  🥚     新增或更新彩蛋                                      ║
        ║  🙈     新增或更新 .gitignore                                ║
        ║  📸     新增或更新快照                                       ║
        ║  ⚗️     进行实验                                            ║
        ║  🔍️     改善 SEO                                            ║
        ║  🏷️     新增或更新类型                                       ║
        ║  🌱     新增或更新种子文件                                   ║
        ║  🚩     新增、更新或移除特性标志                             ║
        ║  🥅     捕获错误                                            ║
        ║  💫     新增或更新动画与过渡                                 ║
        ║  🗑️     标记需要清理的废弃代码                               ║
        ║  🛂     处理授权、角色与权限相关代码                         ║
        ║  🩹     非关键问题的简单修复                                 ║
        ║  🧐     数据探索/检查                                        ║
        ║  ⚰️     移除死代码                                           ║
        ║  🧪     新增失败的测试                                       ║
        ║  👔     新增或更新业务逻辑                                   ║
        ║  🩺     新增或更新健康检查                                   ║
        ║  🧱     基础设施相关变更                                     ║
        ║  🧑‍💻    改善开发者体验                                       ║
        ║  💸     新增赞助或资金相关基础设施                           ║
        ║  🧵     新增或更新多线程/并发相关代码                        ║
        ║  🦺     新增或更新校验相关代码                               ║
        ║  ✈️     改善离线支持                                         ║
        ║  🦖     新增向后兼容代码                                     ║
        ╠══════════════════════════════════════════════════════════════╣
        ║  🔗 完整列表: https://gitmoji.dev/                         ║
