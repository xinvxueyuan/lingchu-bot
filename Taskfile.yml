# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  MD_GLOB: >-
    "apps/**/*.md" "packages/**/*.md" "!**/node_modules/**" "!**/out/**"
    "README.md" "CHANGELOG.md" "CONTRIBUTING.md" "CODE_OF_CONDUCT.md" "Repository-Policy.md" "SECURITY.md" ".github/**/*.md"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  install:
    desc: Install all dependencies
    cmds:
      - uv sync
      - pnpm install

  up:
    desc: Update all dependencies
    cmds:
      - uv sync --upgrade
      - pnpm update

  check:
    desc: Run all static checks (lint + format + markdown + type check)
    cmds:
      - uv run -m ruff check . --output-format=github
      - uv run -m ruff format --check .
      - pnpm exec markdownlint-cli2 {{.MD_GLOB}}
      - pnpm turbo run lint --log-order=stream
      - uv run -m pyright .
      - uv run -m ty check --output-format github
      - pnpm turbo run check-types

  test:
    desc: Run all tests (Python + Docs)
    cmds:
      - uv run -m pytest {{.CLI_ARGS}}
      - pnpm --filter docs test

  format:
    desc: Format all code
    cmds:
      - uv run -m ruff format .
      - pnpm exec markdownlint-cli2 --fix {{.MD_GLOB}}

  fix:
    desc: Auto-fix all linting and type issues
    cmds:
      - uv run -m ruff check --fix .
      - uv run -m ruff format .
      - uv run -m ty check --fix . || true
      - pnpm exec markdownlint-cli2 --fix {{.MD_GLOB}}

  build:
    desc: Build all workspaces
    cmds:
      - pnpm turbo run build

  ci:
    desc: Run the full local CI sequence
    cmds:
      - task: check
      - task: test
      - task: build

  ci:static:
    desc: "[CI] Static analysis checks"
    cmds:
      - uv run -m ruff check . --output-format=github
      - uv run -m ruff format --check .
      - pnpm exec markdownlint-cli2 {{.MD_GLOB}}
      - pnpm turbo run lint

  ci:typecheck:
    desc: "[CI] Type checks"
    cmds:
      - uv run -m pyright .
      - uv run -m ty check --output-format github
      - pnpm turbo run check-types

  ci:test:
    desc: "[CI] Tests with report output"
    cmds:
      - uv run -m pytest --junitxml=test-results/pytest.xml
      - pnpm --filter docs test

  ci:fix:
    desc: "[CI] Auto-fix and format"
    cmds:
      - uv run -m ruff check --fix .
      - uv run -m ruff format .
      - uv run -m ty check --fix . || true
      - pnpm exec markdownlint-cli2 --fix {{.MD_GLOB}}

  ci:build:
    desc: "[CI] Build distribution artifacts"
    cmds:
      - uv build --clear
      - pnpm turbo run build

  ci:docs:
    desc: "[CI] Docs-only check, test and build (no Python toolchain required)"
    cmds:
      - pnpm turbo run lint check-types
      - pnpm --filter docs lint:links
      - pnpm --filter docs test
      - pnpm turbo run build

  ci:version:bump:
    desc: "[CI] Bump development version and emit GitHub Actions outputs"
    cmds:
      - |
        set -euo pipefail

        # Sync version from latest remote tag so the version advances across runs
        git fetch --tags --quiet
        latest_tag="$(git tag --sort=-v:refname --list 'v[0-9]*' | head -1)"
        if [ -n "$latest_tag" ]; then
          tag_version="${latest_tag#v}"
          uv version "$tag_version" --no-sync
        fi

        version_json="$(uv version --bump dev --output-format json --no-sync)"
        new_version="$(python -c 'import json, sys; print(json.load(sys.stdin)["version"])' <<< "$version_json")"

        echo "new_version=$new_version" >> "$GITHUB_OUTPUT"
        echo "$version_json"
        echo "Bumping version to: $new_version"

  ci:version:write-config:
    desc: "[CI] Write version into config.py and package.json"
    requires:
      vars: [VERSION, CONFIG_PATH]
    cmds:
      - |
        set -euo pipefail

        python - <<'PY'
        from pathlib import Path
        import os
        import re

        version = os.environ["VERSION"]
        path = Path(os.environ["CONFIG_PATH"])

        text = path.read_text(encoding="utf-8")
        new_text, count = re.subn(
            r'core_version:\s*str\s*=\s*"[^"]*"',
            f'core_version: str = "{version}"',
            text,
            count=1,
        )

        if count != 1:
            raise RuntimeError("未找到唯一的 core_version 字段")

        path.write_text(new_text, encoding="utf-8")
        PY

        python - <<'PY'
        import json
        import os
        from pathlib import Path

        version = os.environ["VERSION"]
        pkg_path = Path("package.json")

        data = json.loads(pkg_path.read_text(encoding="utf-8"))
        data["version"] = version
        pkg_path.write_text(json.dumps(data, indent=2) + "\n", encoding="utf-8")
        print(f"Wrote version {version} into {pkg_path}")
        PY

  ci:version:tag-only:
    desc: "[CI] Create release tag only (no commit push to avoid branch divergence)"
    requires:
      vars: [VERSION]
    cmds:
      - |
        set -euo pipefail

        version="{{.VERSION}}"
        tag="v${version}"

        if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists locally; skipping tag creation."
        elif git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists on origin; skipping tag creation."
        else
            git tag "$tag"
            git push origin "$tag"
        fi

  ci:version:from-tag:
    desc: "[CI] Restore version from a git tag into config.py (for release builds)"
    requires:
      vars: [TAG, CONFIG_PATH]
    cmds:
      - |
        set -euo pipefail

        version="{{.TAG}}"
        version="${version#v}"

        export VERSION="$version" CONFIG_PATH="{{.CONFIG_PATH}}"
        python - <<'PY'
        from pathlib import Path
        import os
        import re

        version = os.environ["VERSION"]
        path = Path(os.environ["CONFIG_PATH"])

        text = path.read_text(encoding="utf-8")
        new_text, count = re.subn(
            r'core_version:\s*str\s*=\s*"[^"]*"',
            f'core_version: str = "{version}"',
            text,
            count=1,
        )

        if count != 1:
            raise RuntimeError("未找到唯一的 core_version 字段")

        path.write_text(new_text, encoding="utf-8")
        print(f"Restored version {version} into {path}")
        PY

  i18n:
    desc: Extract, update and compile i18n messages
    cmds:
      - uv run pybabel extract -F src/plugins/nonebot_plugin_lingchu_bot/i18n/babel.cfg -o src/plugins/nonebot_plugin_lingchu_bot/i18n/messages.pot src/plugins/nonebot_plugin_lingchu_bot
      - uv run pybabel update -i src/plugins/nonebot_plugin_lingchu_bot/i18n/messages.pot -d src/plugins/nonebot_plugin_lingchu_bot/i18n/locales -D messages
      - uv run pybabel compile -d src/plugins/nonebot_plugin_lingchu_bot/i18n/locales -D messages

  gitmoji:
    desc: 显示 gitmoji + Conventional Commits 中文速查表
    cmds:
      - |
        cat <<'EOF'
        ╔══════════════════════════════════════════════════════════════╗
        ║            gitmoji + Conventional Commits 速查表            ║
        ╠══════════════════════════════════════════════════════════════╣
        ║  格式: <gitmoji> <type>(<scope>)?: <subject>                ║
        ║  示例: ✨ feat: 新增功能                                    ║
        ║        🐛 fix(auth): 修复令牌过期                           ║
        ╠══════════════════════════════════════════════════════════════╣
        ║  Emoji  Type        说明                                   ║
        ╠══════════════════════════════════════════════════════════════╣
        ║  ✨     feat        引入新功能                              ║
        ║  🐛     fix         修复缺陷                                ║
        ║  📝     docs        新增或更新文档                          ║
        ║  🎨     style       改善代码结构/格式(不影响逻辑)           ║
        ║  ♻️     refactor    重构代码(既非新功能也非修缺陷)          ║
        ║  ⚡️     perf        提升性能                                ║
        ║  ✅     test        新增、更新或通过测试                    ║
        ║  👷     build       新增或更新 CI 构建系统                  ║
        ║  💚     ci          修复 CI 构建                           ║
        ║  🔧     chore       新增或更新配置文件                      ║
        ║  ⏪️     revert      回退变更                                ║
        ╠══════════════════════════════════════════════════════════════╣
        ║  其他常用 gitmoji                                           ║
        ╠══════════════════════════════════════════════════════════════╣
        ║  🚑️     紧急修复(热补丁)                                   ║
        ║  🚀     部署相关                                            ║
        ║  💄     新增或更新 UI 和样式文件                            ║
        ║  🎉     初始化项目                                          ║
        ║  🔒️     修复安全或隐私问题                                  ║
        ║  🔐     新增或更新密钥                                      ║
        ║  🔖     发布/版本标签                                       ║
        ║  🚨     修复编译器/linter 警告                              ║
        ║  🚧     工作进行中                                          ║
        ║  ⬇️     降级依赖                                            ║
        ║  ⬆️     升级依赖                                            ║
        ║  📌     锁定依赖到特定版本                                  ║
        ║  📈     新增或更新分析/追踪代码                             ║
        ║  ➕     新增依赖                                            ║
        ║  ➖     移除依赖                                            ║
        ║  🔨     新增或更新开发脚本                                  ║
        ║  🌐     国际化与本地化                                      ║
        ║  ✏️     修复拼写错误                                        ║
        ║  💩     编写需要改进的劣质代码                              ║
        ║  🔀     合并分支                                            ║
        ║  📦️     新增或更新编译文件或包                               ║
        ║  👽️     因外部 API 变更而更新代码                           ║
        ║  🚚     移动或重命名资源                                    ║
        ║  📄     新增或更新许可证                                    ║
        ║  💥     引入破坏性变更                                      ║
        ║  🍱     新增或更新资源文件                                  ║
        ║  ♿️     改善无障碍访问                                      ║
        ║  💡     新增或更新源码中的注释                              ║
        ║  🍻     醉酒编写代码                                        ║
        ║  💬     新增或更新文本与字面量                               ║
        ║  🗃️     执行数据库相关变更                                   ║
        ║  🔊     新增或更新日志                                      ║
        ║  🔇     移除日志                                            ║
        ║  👥     新增或更新贡献者                                    ║
        ║  🚸     改善用户体验/可用性                                  ║
        ║  🏗️     进行架构变更                                         ║
        ║  📱     处理响应式设计                                       ║
        ║  🤡     模拟相关                                            ║
        ║  🥚     新增或更新彩蛋                                      ║
        ║  🙈     新增或更新 .gitignore                                ║
        ║  📸     新增或更新快照                                       ║
        ║  ⚗️     进行实验                                            ║
        ║  🔍️     改善 SEO                                            ║
        ║  🏷️     新增或更新类型                                       ║
        ║  🌱     新增或更新种子文件                                   ║
        ║  🚩     新增、更新或移除特性标志                             ║
        ║  🥅     捕获错误                                            ║
        ║  💫     新增或更新动画与过渡                                 ║
        ║  🗑️     标记需要清理的废弃代码                               ║
        ║  🛂     处理授权、角色与权限相关代码                         ║
        ║  🩹     非关键问题的简单修复                                 ║
        ║  🧐     数据探索/检查                                        ║
        ║  ⚰️     移除死代码                                           ║
        ║  🧪     新增失败的测试                                       ║
        ║  👔     新增或更新业务逻辑                                   ║
        ║  🩺     新增或更新健康检查                                   ║
        ║  🧱     基础设施相关变更                                     ║
        ║  🧑‍💻    改善开发者体验                                       ║
        ║  💸     新增赞助或资金相关基础设施                           ║
        ║  🧵     新增或更新多线程/并发相关代码                        ║
        ║  🦺     新增或更新校验相关代码                               ║
