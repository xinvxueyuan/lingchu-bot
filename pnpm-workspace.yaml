packages:
  - "apps/*"
  - "packages/*"

overrides:
  esbuild: ">=0.28.1"
  postcss: 8.5.15
  vite: "^8.0.16"
  js-yaml: "^4.2.0"
  markdown-it: "^14.2.0"
  # Security fixes for Dependabot alerts
  sharp: "^0.35.3"
  adm-zip: "^0.6.0"
  "@hono/node-server": "^2.0.11"

allowBuilds:
  '@go-task/cli': true
  '@ladybugdb/core': true
  '@scarf/scarf': true
  esbuild: true
  gitnexus: true
  onnxruntime-node: false
  protobufjs: true
  sharp: true
  tree-sitter: true
  tree-sitter-c: true
  tree-sitter-c-sharp: true
  tree-sitter-cpp: true
  tree-sitter-go: true
  tree-sitter-java: true
  tree-sitter-javascript: true
  tree-sitter-kotlin: true
  tree-sitter-php: true
  tree-sitter-python: true
  tree-sitter-ruby: true
  tree-sitter-rust: true
  tree-sitter-typescript: true
  unrs-resolver: true
