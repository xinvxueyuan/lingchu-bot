exclude = '''(?x)^(
  skills/|
  \.agents/skills/|
  \.claude/skills/|
  \.trae/skills/
)'''

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "3e8a8703264a2f4a69428a0aa4dcb512790b2c8c"  # pinned from pre-commit/pre-commit-hooks@v6.0.0
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "check-yaml" },
  { id = "check-toml" },
  { id = "check-json" },
  { id = "check-xml" },
  { id = "check-merge-conflict" },
  { id = "check-added-large-files", args = [
    "--maxkb=2048",
  ] },
  { id = "detect-private-key" },
  { id = "check-case-conflict" },
  { id = "mixed-line-ending", args = [
    "--fix=lf",
  ] },
  { id = "check-symlinks" },
  { id = "destroyed-symlinks" },
]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "2700fd5671c633760d912769c041bfcde2b9a01b"  # pinned from astral-sh/ruff-pre-commit@v0.15.22
hooks = [
  { id = "ruff", args = ["--fix"] },
  { id = "ruff-format" },
]

[[repos]]
repo = "https://github.com/astral-sh/ty-pre-commit"
rev = "1395c6934313bf0c086f3034f10c10747e7efc10"  # pinned from astral-sh/ty-pre-commit@v0.0.61
hooks = [
  { id = "ty" },
]
