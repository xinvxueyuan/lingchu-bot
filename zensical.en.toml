[project]
docs_dir = "docs/en"
site_dir = "site/en"
site_name = "Lingchu Bot Documentation"
site_description = "Lingchu Bot project documentation based on NoneBot2"
site_author = "xinvxueyuan"
site_url = "https://lingchu.zone.id/en/"
repo_url = "https://github.com/xinvxueyuan/lingchu-bot"
edit_uri = "edit/main/docs/en/"
copyright = """
Copyright &copy; 2025 ~ Present
<a href="https://github.com/xinvxueyuan">xinvxueyuan</a>.
Made with GitHub Pages.
"""

nav = [
    { "Home" = "index.md" },
    { "User Guide" = [
        { "Overview" = "user-guide/overview.md" },
        { "Quick Start" = "user-guide/quick-start.md" },
        { "Commands and Group Management" = "user-guide/commands.md" },
        { "Configuration" = "user-guide/configuration.md" },
        { "Troubleshooting" = "user-guide/troubleshooting.md" },
    ] },
    { "Developer Guide" = [
        { "Architecture" = "developer-guide/introduction.md" },
        { "Workflow" = "developer-guide/workflow.md" },
        { "Commit Style" = "developer-guide/commit-style.md" },
        { "Internationalization" = "developer-guide/i18n.md" },
        { "Testing and CI" = "developer-guide/testing-ci.md" },
        { "GitNexus Workflow" = "developer-guide/gitnexus.md" },
    ] },
    { "Project Policy" = "project-policy.md" },
]

[project.theme]
favicon = "../assets/images/favicon.png"
language = "en"
features = [
    "announce.dismiss",
    "content.action.edit",
    "content.action.view",
    "content.code.copy",
    "content.code.select",
    "header.autohide",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.path",
    "navigation.prune",
    "navigation.sections",
    "navigation.tabs.sticky",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.theme.font]
text = "Inter"
code = "Jetbrains Mono"

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.extra.social]]
name = "GitHub"
icon = "fontawesome/brands/github"
link = "https://github.com/xinvxueyuan/lingchu-bot"

[project.extra.consent]
title = "Cookie consent"
description = "We use cookies to remember preferences and help improve the documentation experience."

[project.extra]
generator = false
alternate = [
    { name = "简体中文", link = "/", lang = "zh" },
    { name = "English", link = "/en/", lang = "en" },
]
