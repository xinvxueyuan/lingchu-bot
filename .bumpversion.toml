# .bumpversion.toml 配置文件
# 核心特性：支持 Canary(每夜版)/Dev(开发版)/Beta(测试版)/Preview(预览版)
# 遵循「Automate the pre-release numbering」规范，自动管理预发行版本号递增/重置

[bumpversion]
# 初始版本（可根据项目实际情况修改）
current_version = "0.0.0-dev0"

# 版本号解析规则（正则）：捕获 major/minor/patch + 预发行类型/预发行号
# 支持匹配格式：
# - 正式版：1.2.3
# - 预发行版：0.0.0-canary1、1.2.3-dev5、2.3.4-beta3、3.4.5-preview8
parse = """
    (?P<major>\\d+)
    \\.(?P<minor>\\d+)
    \\.(?P<patch>\\d+)
    (-(?P<pre_type>canary|dev|beta|preview)(?P<pre_num>\\d+))?
"""

# 版本号序列化规则（按优先级生效）
# 1. 有预发行版本：X.Y.Z-pre_typepre_num（如 0.1.0-dev0）
# 2. 正式版：X.Y.Z（如 1.0.0）
serialize = [
    "{major}.{minor}.{patch}-{pre_type}{pre_num}",
    "{major}.{minor}.{patch}",
]

# 版本更新后自动提交 Git 变更（可选，建议开启）
commit = true
# Git 提交信息模板
message = "chore: bump version from {current_version} to {new_version}"

# 版本更新后自动打 Git 标签（可选，建议开启）
tag = true
# 标签名称格式（如 v0.0.0-dev0）
tag_name = "v{new_version}"

# 允许工作区有未提交变更（根据团队规范调整，建议关闭）
allow_dirty = false

# 定义版本号各部分的规则
[bumpversion.parts]
# 预发行类型枚举（严格匹配：canary/dev/beta/preview）
pre_type = ["canary", "dev", "beta", "preview"]
# 预发行版本号（数字类型，自动递增）
pre_num = { type = "integer", value = 0 }

# 【文件1】修改 pyproject.toml 中的 version 字段
[[bumpversion.files]]
filename = "pyproject.toml"
# 匹配 pyproject.toml 中 `version = "x.y.z-xxx"` 格式的行
search = 'version = "{current_version}"'
# 替换为新版本号
replace = 'version = "{new_version}"'

# 【文件2】修改 config.py 中的 Config 类 version 字段
[[bumpversion.files]]
filename = "src/builtin_plugins/lingchu_bot/config.py"
# 匹配 Config 类中 `version: str = "x.y.z-xxx"` 格式的行
search = 'version: str = "{current_version}"'
# 替换为新版本号
replace = 'version: str = "{new_version}"'
