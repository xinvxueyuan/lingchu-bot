# https://probot.github.io/apps/auto-assign/
# Install the app: https://github.com/apps/auto-assign

# Auto-add reviewers
addReviewers: true

# Auto-add assignees
# Options:
#   true    = auto-add assignees
#   false   = don't auto-add assignees
#   author  = set PR creator as assignee
addAssignees: author

# =========
# Reviewers
# =========

# GitHub usernames (no @)
reviewers:
  - xinvxueyuan

# Number of random reviewers per PR
# 0 = add all reviewers
numberOfReviewers: 0

# =========
# Assignees
# =========

# If set, overrides default behavior of deriving assignees from reviewers
# Ignored when addAssignees: author
# assignees:
#   - assigneeA

# Number of assignees per PR
# 0 = add all assignees
# Defaults to numberOfReviewers if not set
# numberOfAssignees: 0

# =================
# Skip Rules
# =================

# Skip auto-assign when PR title contains these keywords
skipKeywords:
  - wip
  - WIP
  - draft
  - Draft
  - do not review
  - no review

# Skip auto-assign for PRs from these users
skipUsers:
  - dependabot[bot]
  - renovate[bot]
  - github-actions[bot]
