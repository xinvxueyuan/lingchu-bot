version: 2
updates:
  # Python (uv) — root pyproject.toml + uv.lock
  - package-ecosystem: "pip"
    target-branch: develop
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5

  # pnpm monorepo — root + apps/* + packages/*
  - package-ecosystem: "npm"
    target-branch: develop
    directories:
      - "/"
      - "/apps/*"
      - "/packages/*"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    groups:
      # Merge the same dependency across multiple workspace directories into a
      # single PR to reduce CI and review burden.
      monorepo-deps:
        group-by: dependency-name

  # GitHub Actions — .github/workflows/*.yml
  - package-ecosystem: "github-actions"
    target-branch: develop
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5
    groups:
      # Group minor and patch updates into a single PR; major versions get
      # separate PRs for easier review.
      actions:
        patterns: ["*"]
        update-types: ["minor", "patch"]
