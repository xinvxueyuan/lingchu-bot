# https://probot.github.io/apps/close-issue-app/
# Install the app: https://github.com/apps/close-issue-app

# Comment that will be sent if an issue is judged to be closed
comment: >
  This issue has been automatically closed because it does not appear to
  follow the issue template. Please use the appropriate issue template and
  provide the required information so we can help you.

issueConfigs:
  # Bug report
  - content:
      - "Bug"
      - "Reproduce"
      - "Expected"
      # Chinese keywords (legacy)
      - "错误"
      - "重现"
      - "预期"

  # Feature request
  - content:
      - "Feature"
      - "Solution"
      # Chinese keywords (legacy)
      - "功能"
      - "期望"

  # Enhancement
  - content:
      - "Enhancement"
      - "Improve"
      # Chinese keywords (legacy)
      - "增强"
      - "改进"

  # Documentation issue
  - content:
      - "Documentation"
      # Chinese keywords (legacy)
      - "文档"

  # Correction
  - content:
      - "Correction"
      - "Suggest"
      # Chinese keywords (legacy)
      - "评议"
      - "建议"

  # Contact
  - content:
      - "Contact"
      # Chinese keywords (legacy)
      - "联系"
