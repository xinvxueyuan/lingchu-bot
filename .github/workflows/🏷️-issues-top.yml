name: 🏷️ Top Issues
on:
    schedule:
        - cron: "0 0 */1 * *"

permissions:
    contents: read

jobs:
    check:
        name: 🔍 Check for open issues
        runs-on: ubuntu-latest
        permissions:
            issues: read
            contents: read
        outputs:
            has_open_issues: ${{ steps.check.outputs.result }}
        steps:
            - id: check
              name: Check open issues
              # pinned from actions/github-script@v9.0.0
              uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const issues = await github.rest.issues.listForRepo({ owner, repo, state: 'open', per_page: 5 });
                      // Exclude pull requests — only count real issues
                      const hasIssue = issues.data.some(i => !i.pull_request);
                      return hasIssue ? 'true' : 'false';

    ShowAndLabelTopIssues:
        name: 🏷️ Display and label top issues
        needs: check
        if: needs.check.outputs.has_open_issues == 'true'
        permissions:
            contents: read
            issues: write
            pull-requests: write
        runs-on: ubuntu-latest
        steps:
            - name: Run top issues action
              # pinned from rickstaa/top-issues-action@v1.3.101
              uses: rickstaa/top-issues-action@7e8dda5d5ae3087670f9094b9724a9a091fc3ba1
              env:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
              with:
                  label: true
                  dashboard: true
                  dashboard_show_total_reactions: true
                  top_issues: true
                  top_bugs: true
                  top_features: true
                  top_pull_requests: true
