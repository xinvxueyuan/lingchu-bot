name: CI

on:
  pull_request:
    branches:
      [main, dev, "dev**", "releases/**", "feature/**", "fix/**", "hotfix/*"]
    paths:
      - "**.py"
      - ".github/workflows/*.yml"
      - "**.toml"
      - "uv.lock"
      - ".pre-commit-config.yaml"
      - "**.md"
  push:
    branches: [main, dev]
    paths:
      - "**.py"
      - ".github/workflows/*.yml"
      - "**.toml"
      - "uv.lock"
      - ".pre-commit-config.yaml"
      - "**.md"

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Lint & Format Check
        run: |
          uv run ruff check . --output-format=github
          uv run ruff format --check .
      - name: Markdown Check
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "**/*.md"

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 预留扩展空间，目前只跑 3.13
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        # 使用 --frozen 确保锁定版本，--no-dev 可以根据需要调整
        run: uv sync --frozen

      - name: Type Check (Pyright)
        run: uv run pyright .

      - name: Run Pytest
        run: uv run pytest --junitxml=test-results/pytest.xml

      # 在 PR 界面展示结果
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test-results/**/*.xml

  auto-format:
    # 仅在 push 到主分支且前序任务成功时执行
    if: github.event_name == 'push' && contains(fromJSON('["refs/heads/main", "refs/heads/dev"]'), github.ref)
    needs: [static-analysis, tests]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Auto Fix & Format
        run: |
          uv run ruff check --fix .
          uv run ruff format .
      - name: Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format [skip ci]"
          file_pattern: "*.py *.toml *.yaml *.yml *.md"
