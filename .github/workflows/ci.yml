name: CI

on:
  pull_request:
    branches:
      [main, dev, "dev**", "releases/**", "feature/**", "fix/**", "hotfix/*"]
    paths:
      - "**.py"
      - "**.ts"
      - "**.tsx"
      - ".github/workflows/*.yml"
      - "**.toml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "uv.lock"
      - ".pre-commit-config.yaml"
      - ".markdownlint.jsonc"
      - "Taskfile.yml"
      - "**.md"
      - "apps/**"
      - "packages/**"
  push:
    branches: [main, dev]
    paths:
      - "**.py"
      - "**.ts"
      - "**.tsx"
      - ".github/workflows/*.yml"
      - "**.toml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "uv.lock"
      - ".pre-commit-config.yaml"
      - ".markdownlint.jsonc"
      - "Taskfile.yml"
      - "**.md"
      - "apps/**"
      - "packages/**"

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile
      - name: astral-sh/setup-uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Install Task
        uses: go-task/setup-task@v1
      - name: Static Analysis
        run: task ci:static

  tests:
    name: Tests & Type Check (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Install Task
        uses: go-task/setup-task@v1

      - name: Install dependencies
        run: uv sync --frozen

      - name: Type Check (Pyright)
        run: task ci:typecheck

      - name: Run Tests
        run: task ci:test

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2.23.0
        if: always()
        with:
          files: test-results/**/*.xml

  auto-format:
    if: github.event_name == 'push' && contains(fromJSON('["refs/heads/main", "refs/heads/dev"]'), github.ref)
    needs: [static-analysis, tests]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile
      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
      - name: Install Task
        uses: go-task/setup-task@v1
      - name: Auto Fix & Format
        run: task ci:fix

      - name: Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v7.1.0
        with:
          commit_message: "🎨 style: auto-format & ty fix [skip ci]"
          file_pattern: "*.py *.toml *.yaml *.yml *.md"
          branch: ${{ github.ref_name }}
