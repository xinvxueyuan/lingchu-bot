name: CI

on:
  pull_request:
    branches:
      - main
      - dev
      - "dev**"
      - "releases/**"
      - "feature/**"
      - "fix/**"
      - "hotfix/*"
    paths:
      - "**.py"
      - ".github/workflows/*.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "prek.toml"
      - ".pre-commit-config.yaml"
      - "**.md"
  push:
    branches:
      - main
      - dev
    paths:
      - "**.py"
      - ".github/workflows/*.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "prek.toml"
      - ".pre-commit-config.yaml"
      - "**.md"

permissions:
  contents: write
  checks: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff-quick-check:
    name: Ruff Quick Check
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml

      - name: 安装开发依赖
        run: uv sync --only-dev --frozen

      - name: 运行 ruff check
        run: uv run ruff check . --output-format=github

      - name: 运行 ruff format (检查格式)
        run: uv run ruff format --check .

  markdown-lint-check:
    name: Markdown Lint Check
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 运行 markdownlint-cli2 (检查格式)
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: "**/*.md"
          config: ".markdownlint.jsonc"

  prek-full-check:
    name: prek Full Check
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 运行 prek
        uses: j178/prek-action@v2
        with:
          extra-args: "--all-files --verbose"
          prek-version: "latest"
          cache: true
          show-verbose-logs: true

  pyright-check:
    name: Pyright Type Check
    runs-on: ubuntu-latest
    needs: [ruff-quick-check]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - name: 安装开发依赖
        run: uv sync --only-dev --frozen

      - name: 运行 pyright
        run: uv run pyright .

  auto-format:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    concurrency:
      group: format-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: 安装 uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - name: 安装开发依赖
        run: uv sync --only-dev --frozen

      - name: 运行 ruff format (自动修复)
        run: uv run ruff format .

      - name: 运行 prek (自动修复)
        uses: j178/prek-action@v2
        with:
          extra-args: "--all-files"
          prek-version: "latest"

      - name: 运行 markdownlint-cli2 (自动修复)
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: "**/*.md"
          fix: true

      - name: 提交格式化变更
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format with ruff and prek, and fix markdown issues"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          branch: ${{ github.ref_name }}
          file_pattern: "*.py *.toml *.yaml *.yml *.md"
