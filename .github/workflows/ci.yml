name: CI

on:
  pull_request:
    branches:
      [main, dev, "dev**", "releases/**", "feature/**", "fix/**", "hotfix/*"]
    paths:
      - "**.py"
      - ".github/workflows/*.yml"
      - "**.toml"
      - "uv.lock"
      - ".pre-commit-config.yaml"
      - "**.md"
  push:
    branches: [main, dev]
    paths:
      - "**.py"
      - ".github/workflows/*.yml"
      - "**.toml"
      - "uv.lock"
      - ".pre-commit-config.yaml"
      - "**.md"

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: astral-sh/setup-uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Lint & Format Check (Ruff)
        run: |
          uv run -m ruff check . --output-format=github
          uv run -m ruff format --check .
      - name: Markdown Check
        uses: DavidAnson/markdownlint-cli2-action@v23.2.0
        with:
          globs: |
            "docs/**/*.md"
            "README.md"
            "CHANGELOG.md"
            "CONTRIBUTING.md"
            "CODE_OF_CONDUCT.md"
            ".github/**/*.md"

  tests:
    name: Tests & Type Check (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Type Check (Pyright)
        run: uv run -m pyright .

      - name: Type Check (ty)
        run: uv run -m ty check --output-format github

      - name: Run Pytest
        run: uv run -m pytest --junitxml=test-results/pytest.xml

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2.23.0
        if: always()
        with:
          files: test-results/**/*.xml

  auto-format:
    if: github.event_name == 'push' && contains(fromJSON('["refs/heads/main", "refs/heads/dev"]'), github.ref)
    needs: [static-analysis, tests]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
      - name: Auto Fix & Format
        run: |
          uv run -m ruff check --fix .
          uv run -m ruff format .
          uv run -m ty check --fix || true

      - name: Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v7.1.0
        with:
          commit_message: "style: auto-format & ty fix [skip ci]"
          file_pattern: "*.py *.toml *.yaml *.yml *.md"
          branch: ${{ github.ref_name }}
