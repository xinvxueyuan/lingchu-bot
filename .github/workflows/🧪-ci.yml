name: 🧪 CI

on:
  pull_request:
    branches:
      [main, dev, "dev**", "releases/**", "feature/**", "fix/**", "hotfix/*"]
    paths:
      - "**.py"
      - "**.ts"
      - "**.tsx"
      - ".github/workflows/🧪-ci.yml"
      - "**.toml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "uv.lock"
      - ".pre-commit-config.yaml"
      - ".markdownlint.jsonc"
      - "Taskfile.yml"
  push:
    branches: [main, dev]
    paths:
      - "**.py"
      - "**.ts"
      - "**.tsx"
      - ".github/workflows/🧪-ci.yml"
      - "**.toml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "uv.lock"
      - ".pre-commit-config.yaml"
      - ".markdownlint.jsonc"
      - "Taskfile.yml"

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  static-analysis:
    name: 🔍 Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # pinned from actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Node
        # pinned from actions/setup-node@v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
      - name: Setup pnpm
        # pinned from pnpm/action-setup@v6.0.8
        uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9
      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile
      - name: Setup uv
        # pinned from astral-sh/setup-uv@v8.1.0
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Install Task
        # pinned from go-task/setup-task@v2.1.0
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa
      - name: Static Analysis
        run: task ci:static

  tests:
    name: 🧪 Tests & Type Check
    runs-on: ubuntu-latest
    steps:
      # pinned from actions/checkout@v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup uv
        # pinned from astral-sh/setup-uv@v8.1.0
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Type Check (Pyright)
        run: uv run -m pyright .

      - name: Type Check (ty)
        run: uv run -m ty check --output-format github

      - name: Run Tests
        run: uv run -m pytest --junitxml=test-results/pytest.xml

      - name: Publish Test Results
        # pinned from EnricoMi/publish-unit-test-result-action@v2.23.0
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040
        if: always()
        with:
          files: test-results/**/*.xml

  docs-check:
    name: 📚 Docs Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
      - name: Setup pnpm
        uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9
      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint & Type Check
        run: pnpm turbo run lint check-types
      - name: Test
        run: pnpm --filter docs test

  auto-format:
    name: 🎨 Auto Fix & Format
    if: github.event_name == 'push' && contains(fromJSON('["refs/heads/main", "refs/heads/dev"]'), github.ref)
    needs: [static-analysis, tests]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      # pinned from actions/checkout@v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Setup Node
        # pinned from actions/setup-node@v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
      - name: Setup pnpm
        # pinned from pnpm/action-setup@v6.0.8
        uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9
      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile
      - name: Setup uv
        # pinned from astral-sh/setup-uv@v8.1.0
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          python-version: "3.13"
      - name: Install Task
        # pinned from go-task/setup-task@v2.1.0
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa
      - name: Auto Fix & Format
        run: task ci:fix

      - name: Commit Changes
        # pinned from stefanzweifel/git-auto-commit-action@v7.1.0
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9
        with:
          commit_message: "🎨 style: auto-format & ty fix [skip ci]"
          file_pattern: "*.py *.toml *.yaml *.yml *.md"
          branch: ${{ github.ref_name }}
