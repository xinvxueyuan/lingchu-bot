name: 🧪 CI

on:
  pull_request:
    branches:
      [main, dev, "dev**", "releases/**", "feature/**", "fix/**", "hotfix/*"]
    paths:
      - "**.py"
      - "**.ts"
      - "**.tsx"
      - "**.md"
      - "**.mts"
      - "**.mjs"
      - "**.mdx"
      - "**.css"
      - "**.json"
      - ".github/workflows/🧪-ci.yml"
      - "**.toml"
      - "prek.toml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "uv.lock"
      - ".markdownlint-cli2.jsonc"
      - "Taskfile.yml"
  push:
    branches: [main, dev]
    paths:
      - "**.py"
      - "**.ts"
      - "**.tsx"
      - "**.md"
      - "**.mts"
      - "**.mjs"
      - "**.mdx"
      - "**.css"
      - "**.json"
      - ".github/workflows/🧪-ci.yml"
      - "**.toml"
      - "prek.toml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "uv.lock"
      - ".markdownlint-cli2.jsonc"
      - "Taskfile.yml"

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── Change Detection ──────────────────────────────────────────────
  # 颗粒度化：检测变更文件类型，按需触发下游 job，避免无谓的 Python/frontend 检查
  # 逻辑与 .husky/pre-commit v3 保持一致
  changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.detect.outputs.python }}
      markdown: ${{ steps.detect.outputs.markdown }}
      frontend: ${{ steps.detect.outputs.frontend }}
      frontend-code: ${{ steps.detect.outputs.frontend-code }}
      frontend-style: ${{ steps.detect.outputs.frontend-style }}
      frontend-content: ${{ steps.detect.outputs.frontend-content }}
      frontend-tsx: ${{ steps.detect.outputs.frontend-tsx }}
    steps:
      - name: Checkout
        # pinned from actions/checkout@v6.0.3
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
      - name: Detect changes
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          # Determine diff range: PR → base..HEAD, push → before..after
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="HEAD~1"
          fi
          FILES=$(git diff --name-only "$BASE" HEAD 2>/dev/null || git ls-files)

          PYTHON=false
          MARKDOWN=false
          FRONTEND=false
          FRONTEND_CODE=false
          FRONTEND_STYLE=false
          FRONTEND_CONTENT=false
          FRONTEND_TSX=false

          # Python: .py / pyproject.toml / uv.lock / ruff.toml / .python-version
          if echo "$FILES" | grep -qE '\.py$|(^|/)(pyproject\.toml|uv\.lock|\.python-version|ruff\.toml|\.ruff\.toml)$'; then
            PYTHON=true
          fi
          # Markdown: .md
          if echo "$FILES" | grep -qE '\.md$'; then
            MARKDOWN=true
          fi
          # Docs: code files (.ts/.tsx/.mjs/.mts) + config files
          if echo "$FILES" | grep -qE '^apps/docs/.*\.(ts|tsx|mjs|mts)$|^apps/docs/(next\.config\.mjs|source\.config\.ts|tsconfig\.json|vitest\.config\.ts|eslint\.config\.mjs|postcss\.config\.mjs|package\.json)$'; then
            FRONTEND=true
            FRONTEND_CODE=true
          fi
          # Docs: content files (.mdx/.json)
          if echo "$FILES" | grep -qE '^apps/docs/.*\.(mdx|json)$'; then
            FRONTEND=true
            FRONTEND_CONTENT=true
          fi
          # Docs: style files (.css) — triggers ESLint but NOT Vitest
          if echo "$FILES" | grep -qE '^apps/docs/.*\.css$'; then
            FRONTEND=true
            FRONTEND_STYLE=true
          fi
          # Docs: .tsx files (React components → React Doctor)
          if echo "$FILES" | grep -qE '^apps/docs/.*\.tsx$'; then
            FRONTEND_TSX=true
          fi
          # Packages: code/style files (.ts/.tsx/.mjs/.mts/.js/.css)
          if echo "$FILES" | grep -qE '^packages/.*\.(ts|tsx|mjs|mts|js|css)$'; then
            FRONTEND=true
            FRONTEND_CODE=true
          fi
          # Packages: config files (.json)
          if echo "$FILES" | grep -qE '^packages/.*\.json$'; then
            FRONTEND=true
          fi

          {
            echo "python=$PYTHON"
            echo "markdown=$MARKDOWN"
            echo "frontend=$FRONTEND"
            echo "frontend-code=$FRONTEND_CODE"
            echo "frontend-style=$FRONTEND_STYLE"
            echo "frontend-content=$FRONTEND_CONTENT"
            echo "frontend-tsx=$FRONTEND_TSX"
          } >> "$GITHUB_OUTPUT"

          # Step summary
          {
            echo "## 🔍 Change Detection"
            echo ""
            echo "| Category | Detected |"
            echo "|----------|----------|"
            echo "| Python | \`$PYTHON\` |"
            echo "| Markdown | \`$MARKDOWN\` |"
            echo "| Frontend (any) | \`$FRONTEND\` |"
            echo "| Frontend Code (ESLint+Vitest) | \`$FRONTEND_CODE\` |"
            echo "| Frontend Style (ESLint only) | \`$FRONTEND_STYLE\` |"
            echo "| Frontend Content (check-types+Vitest) | \`$FRONTEND_CONTENT\` |"
            echo "| Frontend TSX (React Doctor) | \`$FRONTEND_TSX\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  static-analysis:
    name: 🔍 Static Analysis
    needs: changes
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.markdown == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # pinned from actions/checkout@v6.0.3
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Setup Node
        # pinned from actions/setup-node@v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
      - name: Setup pnpm
        # pinned from pnpm/action-setup@v6.0.9
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile
      - name: Setup uv
        # pinned from astral-sh/setup-uv@v8.2.0
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install Task
        # pinned from go-task/setup-task@v2.1.0
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa
      - name: Static Analysis
        run: |
          # Auto-fix before check to self-heal fixable issues
          task ci:fix
          task ci:static

  tests:
    name: 🧪 Tests & Type Check (${{ matrix.db.label }})
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        db:
          - url: sqlite+aiosqlite:///db.sqlite3
            label: SQLite
            driver_install: ""
          - url: postgresql+psycopg://postgres:postgres@localhost:5432/postgres
            label: PostgreSQL
            driver_install: ""
          - url: mysql+aiomysql://mysql:mysql@localhost:3306/mymysql
            label: MySQL
            driver_install: ""
          - url: mariadb+mariadb://mariadb:mariadb@localhost:3306/mymariadb
            label: MariaDB
            driver_install: ""
          - url: oracle+oracledb://system:oracle@localhost:1521/?service_name=FREEPDB1
            label: Oracle
            driver_install: oracle_thin
          - url: mssql+aioodbc://sa:Password!1@localhost:1433/master?driver=ODBC+Driver+18+for+SQL+Server&TrustServerCertificate=yes
            label: SQLServer
            driver_install: mssql_odbc
      fail-fast: false
    env:
      SQLALCHEMY_DATABASE_URL: ${{ matrix.db.url }}
    services:
      postgresql:
        image: ${{ startsWith(matrix.db.url, 'postgresql') && 'postgres:16-alpine' || '' }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s
      mysql:
        image: ${{ startsWith(matrix.db.url, 'mysql') && 'mysql:8.4' || '' }}
        env:
          MYSQL_ROOT_PASSWORD: mysql
          MYSQL_USER: mysql
          MYSQL_PASSWORD: mysql
          MYSQL_DATABASE: mymysql
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -pmysql"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s
      mariadb:
        image: ${{ startsWith(matrix.db.url, 'mariadb') && 'mariadb:11' || '' }}
        env:
          MARIADB_USER: mariadb
          MARIADB_PASSWORD: mariadb
          MARIADB_DATABASE: mymariadb
          MARIADB_RANDOM_ROOT_PASSWORD: "yes"
        ports:
          - 3306:3306
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 60s
      oracle:
        image: ${{ startsWith(matrix.db.url, 'oracle') && 'gvenzl/oracle-free:23-slim' || '' }}
        env:
          ORACLE_PASSWORD: oracle
          ORACLE_DATABASE: FREEPDB1
        ports:
          - 1521:1521
        options: >-
          --health-cmd "bash -c 'echo > /dev/tcp/localhost/1521'"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 40
          --health-start-period 180s
      mssql:
        image: ${{ startsWith(matrix.db.url, 'mssql') && 'mcr.microsoft.com/azure-sql-edge:latest' || '' }}
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "Password!1"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Password!1' -No -Q 'SELECT 1' || exit 1"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 30
          --health-start-period 90s
    steps:
      - name: Checkout
        # pinned from actions/checkout@v6.0.3
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup uv
        # pinned from astral-sh/setup-uv@v8.2.0
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python dependencies
        # pinned from nick-fields/retry@v4.0.0
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60
        with:
          timeout_minutes: 5
          max_attempts: 4
          retry_wait_seconds: 30
          command: uv sync --frozen

      - name: Install system ODBC driver (SQL Server)
        if: matrix.db.driver_install == 'mssql_odbc'
        run: |
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 mssql-tools18 unixodbc-dev

      - name: Verify Oracle Thin mode (no Oracle Client needed)
        if: matrix.db.driver_install == 'oracle_thin'
        run: echo "oracledb uses Thin mode; no Oracle Client required"

      - name: Run migrations
        run: uv run nb orm upgrade

      - name: Type Check (Pyright)
        run: uv run -m pyright .

      - name: Type Check (ty)
        run: uv run -m ty check --output-format github

      - name: Run Tests
        run: uv run -m pytest --junitxml=test-results/pytest.xml

      - name: Publish Test Results
        # pinned from EnricoMi/publish-unit-test-result-action@v2.24.0
        uses: EnricoMi/publish-unit-test-result-action@d0a4676d0e0b938bc201470d88276b7c74c712b3
        if: always()
        with:
          files: test-results/**/*.xml

  docs-check:
    name: 📚 Docs Check
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile
      - name: ESLint
        # 对齐 pre-commit v3 NEEDS_LINT：代码/样式/配置变更触发（纯 .mdx/.json 内容跳过）
        if: needs.changes.outputs.frontend-code == 'true' || needs.changes.outputs.frontend-style == 'true'
        run: pnpm turbo run lint
      - name: Type Check
        # 对齐 pre-commit v3 NEEDS_TYPE_CHECK：任意前端变更触发（fumadocs-mdx 重新生成类型，CSS Modules 可能影响类型）
        run: pnpm turbo run check-types
      - name: Link Validation
        # 内容变更（.mdx）可能引入新链接，需校验
        if: needs.changes.outputs.frontend-content == 'true'
        run: pnpm --filter docs lint:links
      - name: Test
        # 对齐 pre-commit v3 NEEDS_DOCS_TEST：代码/内容/配置变更触发（纯 .css 样式跳过）
        if: needs.changes.outputs.frontend-code == 'true' || needs.changes.outputs.frontend-content == 'true'
        run: pnpm --filter docs test

  auto-format:
    name: 🎨 Auto Fix & Format
    needs: [changes, static-analysis, tests]
    # always() allows running even when static-analysis/tests are skipped (no Python changes).
    # Only run when Python or markdown files changed (ci:fix only fixes Python + markdown).
    # Block on failure (not skip) of upstream jobs.
    if: >-
      always() &&
      github.event_name == 'push' &&
      contains(fromJSON('["refs/heads/main", "refs/heads/dev"]'), github.ref) &&
      (needs.changes.outputs.python == 'true' || needs.changes.outputs.markdown == 'true') &&
      needs.static-analysis.result != 'failure' &&
      needs.tests.result != 'failure'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      # pinned from actions/checkout@v6.0.3
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Setup Node
        # pinned from actions/setup-node@v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
      - name: Setup pnpm
        # pinned from pnpm/action-setup@v6.0.9
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile
      - name: Setup uv
        # pinned from astral-sh/setup-uv@v8.2.0
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          python-version: "3.13"
          cache-dependency-glob: uv.lock
      - name: Install Task
        # pinned from go-task/setup-task@v2.1.0
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa
      - name: Auto Fix & Format
        run: task ci:fix

      - name: Restore skills directory
        # Prevent auto-commit from touching synced skills files
        run: git checkout -- "skills/" ".agents/skills/" ".claude/skills/" ".trae/skills/" 2>/dev/null || true

      - name: Commit Changes
        # pinned from stefanzweifel/git-auto-commit-action@v7.1.0
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9
        with:
          commit_message: "🎨 style: auto-format & ty fix [skip ci]"
          file_pattern: "*.py *.toml *.yaml *.yml *.md"
          branch: ${{ github.ref_name }}
