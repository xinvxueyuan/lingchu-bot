name: 🚀 Release

on:
  push:
    branches:
      - "releases/**"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, for example 0.0.1"
        required: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  validate:
    name: 🔎 Validate release input
    runs-on: ubuntu-latest
    outputs:
      minor_version: ${{ steps.version.outputs.minor_version }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: 📥 Checkout
        # pinned from actions/checkout@v6.0.3
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: 🔖 Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME#releases/}"
          fi
          case "$version" in
            [0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "Invalid release version: $version" >&2; exit 1 ;;
          esac
          echo "minor_version=${version%.*}" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: 🔨 Install Task
        # pinned from go-task/setup-task@v2.1.0
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa

      - name: ✅ Verify version files
        run: task release:verify-version VERSION="${{ steps.version.outputs.version }}"

  build:
    name: 📦 Build artifacts
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: 📥 Checkout
        # pinned from actions/checkout@v6.0.3
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: ⚡ Setup Node
        # pinned from actions/setup-node@v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: 📦 Setup pnpm
        # pinned from pnpm/action-setup@v6.0.9
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271

      - name: 📦 Install Node dependencies
        # pinned from nick-fields/retry@v4.0.0
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60
        with:
          timeout_minutes: 5
          max_attempts: 4
          retry_wait_seconds: 30
          command: pnpm install --frozen-lockfile

      - name: ⚡ Install uv
        # pinned from astral-sh/setup-uv@v8.2.0
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          github-token: ${{ github.token }}
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: 🔨 Install Task
        # pinned from go-task/setup-task@v2.1.0
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa

      - name: 🧹 Remove non-distribution infrastructure
        run: scripts/clean-release-infra.sh

      - name: 📦 Build
        run: task ci:build

      - name: 📤 Upload dist
        # pinned from actions/upload-artifact@v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-dist-${{ needs.validate.outputs.version }}
          path: dist
          if-no-files-found: error

  publish-pypi:
    name: 🐍 Publish PyPI
    runs-on: ubuntu-latest
    needs: [validate, build]
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: 📥 Download dist
        # pinned from actions/download-artifact@v7.0.0
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131
        with:
          name: release-dist-${{ needs.validate.outputs.version }}
          path: dist

      - name: 🛡️ Attest build provenance
        # pinned from actions/attest-build-provenance@v4.1.0
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: "dist/*"

      - name: 📦 Publish to PyPI
        # pinned from pypa/gh-action-pypi-publish@release/v1
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b

  publish-image:
    name: 🐳 Publish GHCR image
    runs-on: ubuntu-latest
    needs: [validate, build]
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: 📥 Checkout
        # pinned from actions/checkout@v6.0.3
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: 🧹 Remove non-distribution infrastructure
        run: scripts/clean-release-infra.sh

      - name: 🔧 Setup Docker buildx
        # pinned from docker/setup-buildx-action@v3.12.0
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: 🔐 Login to GHCR
        # pinned from docker/login-action@v3.7.0
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Docker metadata
        id: meta
        # pinned from docker/metadata-action@v5.10.0
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.validate.outputs.version }}
            type=raw,value=${{ needs.validate.outputs.minor_version }}

      - name: 🐳 Build and push
        id: build
        # pinned from docker/build-push-action@v6.19.2
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          build-args: |
            VERSION=${{ needs.validate.outputs.version }}
            VCS_REF=${{ github.sha }}

  github-release:
    name: 🏷️ GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, publish-pypi, publish-image]
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout
        # pinned from actions/checkout@v6.0.3
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: 🔨 Install Task
        # pinned from go-task/setup-task@v2.1.0
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa

      - name: 🏷️ Create tag
        run: task ci:version:tag-only VERSION="${{ needs.validate.outputs.version }}"

      - name: 📥 Download dist
        # pinned from actions/download-artifact@v7.0.0
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131
        with:
          name: release-dist-${{ needs.validate.outputs.version }}
          path: dist

      - name: 📝 Prepare release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.validate.outputs.version }}"
          notes_path=".github/releases/${version}.md"
          body_path="${RUNNER_TEMP}/release-notes-${version}.md"
          if [ ! -f "$notes_path" ]; then
            echo "Missing release notes: ${notes_path}" >&2
            exit 1
          fi
          cp "$notes_path" "$body_path"
          echo "body_path=$body_path" >> "$GITHUB_OUTPUT"

      - name: 🚀 Create GitHub Release
        # pinned from softprops/action-gh-release@v2.6.2
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: v${{ needs.validate.outputs.version }}
          name: Lingchu Bot v${{ needs.validate.outputs.version }}
          files: dist/*
          body_path: ${{ steps.notes.outputs.body_path }}
