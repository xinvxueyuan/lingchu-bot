name: 🧪 Frontend CI

on:
  pull_request:
    branches:
      [main, dev, "dev**", "releases/**", "feature/**", "fix/**", "hotfix/*"]
    paths:
      - "**.ts"
      - "**.tsx"
      - "**.mts"
      - "**.mjs"
      - "**.mdx"
      - "**.css"
      - "**.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/🧪-frontend.yml"
      - ".github/actions/detect-changes/**"
  push:
    branches: [main, dev]
    paths:
      - "**.ts"
      - "**.tsx"
      - "**.mts"
      - "**.mjs"
      - "**.mdx"
      - "**.css"
      - "**.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/🧪-frontend.yml"
      - ".github/actions/detect-changes/**"

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.ref }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── Change Detection ──────────────────────────────────────────────
  # 颗粒度化：检测前端变更文件类型，按需触发下游 job
  # 逻辑与 .husky/pre-commit v3 保持一致，共享 .github/actions/detect-changes
  changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.detect.outputs.frontend }}
      frontend-code: ${{ steps.detect.outputs.frontend-code }}
      frontend-style: ${{ steps.detect.outputs.frontend-style }}
      frontend-content: ${{ steps.detect.outputs.frontend-content }}
      frontend-tsx: ${{ steps.detect.outputs.frontend-tsx }}
    steps:
      - id: detect
        uses: ./.github/actions/detect-changes

  docs-check:
    name: 📚 Docs Check
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Setup Node
        # pinned from actions/setup-node@v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
      - name: Setup pnpm
        # pinned from pnpm/action-setup@v6.0.9
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile
      - name: ESLint
        # 对齐 pre-commit v3 NEEDS_LINT：代码/样式/配置变更触发（纯 .mdx/.json 内容跳过）
        if: needs.changes.outputs.frontend-code == 'true' || needs.changes.outputs.frontend-style == 'true'
        run: pnpm turbo run lint
      - name: Type Check
        # 对齐 pre-commit v3 NEEDS_TYPE_CHECK：任意前端变更触发（fumadocs-mdx 重新生成类型，CSS Modules 可能影响类型）
        run: pnpm turbo run check-types
      - name: Link Validation
        # 内容变更（.mdx）可能引入新链接，需校验
        if: needs.changes.outputs.frontend-content == 'true'
        run: pnpm --filter docs lint:links
      - name: Test
        # 对齐 pre-commit v3 NEEDS_DOCS_TEST：代码/内容/配置变更触发（纯 .css 样式跳过）
        if: needs.changes.outputs.frontend-code == 'true' || needs.changes.outputs.frontend-content == 'true'
        run: pnpm --filter docs test
