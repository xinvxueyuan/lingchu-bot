# React Doctor — finds security, performance, correctness, accessibility,
# bundle-size, and architecture issues in React codebases.
#
# Docs: https://www.react.doctor/ci
# Source: https://github.com/millionco/react-doctor
#
# NOTE: Uses CLI directly instead of millionco/react-doctor@v2 action due to
# upstream bugs (detached HEAD, ANSI leak in PR comments — see PR #80).
# Switch back to the action once upstream fixes are released.
#
# 颗粒度化（v3）：paths 仅触发 .tsx 变更，与 .husky/pre-commit 的
# NEEDS_REACT_DOCTOR 逻辑保持一致。React Doctor 扫描 React 组件（.tsx），
# 非 .ts/.css/.mdx 变更无需触发。

name: 🩺 React Doctor

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "**.tsx"
      - ".github/workflows/🩺-react-doctor.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  push:
    branches: [main]
    paths:
      - "**.tsx"
      - ".github/workflows/🩺-react-doctor.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

permissions:
  contents: read

concurrency:
  group: react-doctor-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  react-doctor:
    name: 🩺 React Doctor Scan
    runs-on: ubuntu-latest
    steps:
      # pinned from actions/checkout@v6.1.0
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803

      - name: Setup Node
        # pinned from actions/setup-node@v6.5.0
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: 24

      - name: Setup pnpm
        # pinned from pnpm/action-setup@v6.0.9
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Run React Doctor
        # --fail-on error: only block CI on errors, not warnings
        # --no-telemetry: disable analytics in CI
        env:
          NO_COLOR: 1
        run: npx react-doctor@latest . --fail-on error --no-telemetry --project docs
