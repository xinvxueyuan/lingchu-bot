name: 🧪 Python CI

on:
  pull_request:
    branches:
      [main, dev, "dev**", "releases/**", "feature/**", "fix/**", "hotfix/*"]
    paths:
      - "**.py"
      - "**.md"
      - "**.toml"
      - "uv.lock"
      - "prek.toml"
      - "Taskfile.yml"
      - ".markdownlint-cli2.jsonc"
      - ".github/workflows/🧪-python.yml"
      - ".github/actions/detect-changes/**"
  push:
    branches: [main, dev]
    paths:
      - "**.py"
      - "**.md"
      - "**.toml"
      - "uv.lock"
      - "prek.toml"
      - "Taskfile.yml"
      - ".markdownlint-cli2.jsonc"
      - ".github/workflows/🧪-python.yml"
      - ".github/actions/detect-changes/**"

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: python-ci-${{ github.ref }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── Change Detection ──────────────────────────────────────────────
  # 颗粒度化：检测变更文件类型，按需触发下游 job，避免无谓的 Python 检查
  # 逻辑与 .husky/pre-commit v3 保持一致，共享 .github/actions/detect-changes
  changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.detect.outputs.python }}
      markdown: ${{ steps.detect.outputs.markdown }}
    steps:
      - name: Checkout
        # 本地 composite action (`./.github/actions/detect-changes`) 在
        # `uses:` 解析时就需要 action.yml，必须先 checkout。
        # pinned from actions/checkout@v6.0.3
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
      - id: detect
        uses: ./.github/actions/detect-changes

  static-analysis:
    name: 🔍 Static Analysis
    needs: changes
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.markdown == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # pinned from actions/checkout@v6.0.3
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Setup Node
        # pinned from actions/setup-node@v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
      - name: Setup pnpm
        # pinned from pnpm/action-setup@v6.0.9
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile
      - name: Setup uv
        # pinned from astral-sh/setup-uv@v8.2.0
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install Task
        # pinned from go-task/setup-task@v2.1.0
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa
      - name: Static Analysis
        run: |
          # Auto-fix before check to self-heal fixable issues
          task ci:fix
          task ci:static

  tests:
    name: 🧪 Tests & Type Check (${{ matrix.db.label }})
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        db:
          # ── SQLite (in-process; version pinned by Python sqlite3/aiosqlite) ──
          - engine: sqlite
            url: sqlite+aiosqlite:///db.sqlite3
            label: SQLite
            driver_install: ""
            image: ""
          # ── PostgreSQL: 16 (supported until Nov 2028) + 18 (latest, Sep 2025) ──
          - engine: postgresql
            url: postgresql+psycopg://postgres:postgres@localhost:5432/postgres
            label: PostgreSQL 16
            driver_install: ""
            image: postgres:16-alpine
          - engine: postgresql
            url: postgresql+psycopg://postgres:postgres@localhost:5432/postgres
            label: PostgreSQL 18
            driver_install: ""
            image: postgres:18-alpine
          # ── MySQL: 8.4 LTS (until ~2032) + 9.7 LTS (until ~2034, Apr 2026) ──
          - engine: mysql
            url: mysql+aiomysql://mysql:mysql@localhost:3306/mymysql
            label: MySQL 8.4 LTS
            driver_install: ""
            image: mysql:8.4
          - engine: mysql
            url: mysql+aiomysql://mysql:mysql@localhost:3306/mymysql
            label: MySQL 9.7 LTS
            driver_install: ""
            image: mysql:9.7
          # ── MariaDB: 11.4 LTS (until May 2029) + 11.8 LTS (until Jun 2028) ──
          - engine: mariadb
            url: mariadb+mariadb://mariadb:mariadb@localhost:3306/mymariadb
            label: MariaDB 11.4 LTS
            driver_install: ""
            image: mariadb:11.4
          - engine: mariadb
            url: mariadb+mariadb://mariadb:mariadb@localhost:3306/mymariadb
            label: MariaDB 11.8 LTS
            driver_install: ""
            image: mariadb:11.8
          # ── Oracle 23ai Free (only freely available version; no LTS split) ──
          - engine: oracle
            url: oracle+oracledb://system:oracle@localhost:1521/?service_name=FREEPDB1
            label: Oracle 23ai
            driver_install: oracle_thin
            image: gvenzl/oracle-free:23-slim
          # ── SQL Server: 2022 + 2025 (migrated off deprecated azure-sql-edge) ──
          - engine: mssql
            url: mssql+aioodbc://sa:Password!1@localhost:1433/master?driver=ODBC+Driver+18+for+SQL+Server&TrustServerCertificate=yes
            label: SQL Server 2022
            driver_install: mssql_odbc
            image: mcr.microsoft.com/mssql/server:2022-latest
          - engine: mssql
            url: mssql+aioodbc://sa:Password!1@localhost:1433/master?driver=ODBC+Driver+18+for+SQL+Server&TrustServerCertificate=yes
            label: SQL Server 2025
            driver_install: mssql_odbc
            image: mcr.microsoft.com/mssql/server:2025-latest
    env:
      SQLALCHEMY_DATABASE_URL: ${{ matrix.db.url }}
    services:
      postgresql:
        image: ${{ matrix.db.engine == 'postgresql' && matrix.db.image || '' }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s
      mysql:
        image: ${{ matrix.db.engine == 'mysql' && matrix.db.image || '' }}
        env:
          MYSQL_ROOT_PASSWORD: mysql
          MYSQL_USER: mysql
          MYSQL_PASSWORD: mysql
          MYSQL_DATABASE: mymysql
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -pmysql"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s
      mariadb:
        image: ${{ matrix.db.engine == 'mariadb' && matrix.db.image || '' }}
        env:
          MARIADB_USER: mariadb
          MARIADB_PASSWORD: mariadb
          MARIADB_DATABASE: mymariadb
          MARIADB_RANDOM_ROOT_PASSWORD: "yes"
        ports:
          - 3306:3306
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 60s
      oracle:
        image: ${{ matrix.db.engine == 'oracle' && matrix.db.image || '' }}
        env:
          ORACLE_PASSWORD: oracle
          ORACLE_DATABASE: FREEPDB1
        ports:
          - 1521:1521
        options: >-
          --health-cmd "bash -c 'echo > /dev/tcp/localhost/1521'"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 40
          --health-start-period 180s
      mssql:
        image: ${{ matrix.db.engine == 'mssql' && matrix.db.image || '' }}
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "Password!1"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Password!1' -No -Q 'SELECT 1' || exit 1"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 30
          --health-start-period 90s
    steps:
      - name: Checkout
        # pinned from actions/checkout@v6.0.3
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup uv
        # pinned from astral-sh/setup-uv@v8.2.0
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python dependencies
        # pinned from nick-fields/retry@v4.0.0
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60
        with:
          timeout_minutes: 5
          max_attempts: 4
          retry_wait_seconds: 30
          command: uv sync --frozen

      - name: Install system ODBC driver (SQL Server)
        if: matrix.db.driver_install == 'mssql_odbc'
        run: |
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 mssql-tools18 unixodbc-dev

      - name: Verify Oracle Thin mode (no Oracle Client needed)
        if: matrix.db.driver_install == 'oracle_thin'
        run: echo "oracledb uses Thin mode; no Oracle Client required"

      - name: Run migrations
        run: uv run nb orm upgrade

      - name: Type Check (Pyright)
        run: uv run -m pyright .

      - name: Type Check (ty)
        run: uv run -m ty check --output-format github

      - name: Run Tests
        run: uv run -m pytest --junitxml=test-results/pytest.xml

      - name: Publish Test Results
        # pinned from EnricoMi/publish-unit-test-result-action@v2.24.0
        uses: EnricoMi/publish-unit-test-result-action@d0a4676d0e0b938bc201470d88276b7c74c712b3
        if: always()
        with:
          files: test-results/**/*.xml

  auto-format:
    name: 🎨 Auto Fix & Format
    needs: [changes, static-analysis, tests]
    # always() allows running even when static-analysis/tests are skipped (no Python changes).
    # Only run on push (standard convention: no commits in PR). ci:fix only fixes Python + markdown.
    # Block on failure (not skip) of upstream jobs.
    if: >-
      always() &&
      github.event_name == 'push' &&
      contains(fromJSON('["refs/heads/main", "refs/heads/dev"]'), github.ref) &&
      (needs.changes.outputs.python == 'true' || needs.changes.outputs.markdown == 'true') &&
      needs.static-analysis.result != 'failure' &&
      needs.tests.result != 'failure'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      # pinned from actions/checkout@v6.0.3
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Setup Node
        # pinned from actions/setup-node@v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
      - name: Setup pnpm
        # pinned from pnpm/action-setup@v6.0.9
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile
      - name: Setup uv
        # pinned from astral-sh/setup-uv@v8.2.0
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          python-version: "3.13"
          cache-dependency-glob: uv.lock
      - name: Install Task
        # pinned from go-task/setup-task@v2.1.0
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa
      - name: Auto Fix & Format
        run: task ci:fix

      - name: Restore skills directory
        # Prevent auto-commit from touching synced skills files
        run: git checkout -- "skills/" ".agents/skills/" ".claude/skills/" ".trae/skills/" 2>/dev/null || true

      - name: Commit Changes
        # pinned from stefanzweifel/git-auto-commit-action@v7.1.0
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9
        with:
          commit_message: "🎨 style: auto-format & ty fix [skip ci]"
          file_pattern: "*.py *.toml *.yaml *.yml *.md"
          branch: ${{ github.ref_name }}
