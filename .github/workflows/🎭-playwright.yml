name: 🎭 Playwright

on:
  pull_request:
    branches:
      [main, dev, "dev**", "releases/**", "feature/**", "fix/**", "hotfix/*"]
    paths:
      - "apps/docs/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/🎭-playwright.yml"
  push:
    branches: [main, dev]
    paths:
      - "apps/docs/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/🎭-playwright.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  playwright:
    name: 🎭 Docs E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        # pinned from actions/checkout@v6.1.0
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803

      - name: Setup Node
        # pinned from actions/setup-node@v6.5.0
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: 24

      - name: Setup pnpm
        # pinned from pnpm/action-setup@v6.0.9
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        # pinned from actions/cache@v6.0.0
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('apps/docs/package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        # pinned from nick-fields/retry@v4.0.0
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 60
          command: pnpm --filter docs exec playwright install --with-deps

      - name: Run Playwright tests
        run: pnpm --filter docs run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        # pinned from actions/upload-artifact@v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: playwright-report
          path: apps/docs/playwright-report/
          retention-days: 7

      - name: Upload Playwright traces
        if: ${{ !cancelled() }}
        # pinned from actions/upload-artifact@v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: playwright-test-results
          path: apps/docs/test-results/
          retention-days: 7
