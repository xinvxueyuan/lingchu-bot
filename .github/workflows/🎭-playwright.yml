name: 🎭 Playwright

on:
  pull_request:
    branches:
      [main, dev, "dev**", "releases/**", "feature/**", "fix/**", "hotfix/*"]
    paths:
      - "apps/docs/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/🎭-playwright.yml"
  push:
    branches: [main, dev]
    paths:
      - "apps/docs/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/🎭-playwright.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  playwright:
    name: 🎭 Docs E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        # pinned from actions/checkout@v6.0.3
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Node
        # pinned from actions/setup-node@v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: Setup pnpm
        # pinned from pnpm/action-setup@v6.0.8
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter docs exec playwright install --with-deps

      - name: Run Playwright tests
        run: pnpm --filter docs run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        # pinned from actions/upload-artifact@v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: playwright-report
          path: apps/docs/playwright-report/
          retention-days: 7

      - name: Upload Playwright traces
        if: ${{ !cancelled() }}
        # pinned from actions/upload-artifact@v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: playwright-test-results
          path: apps/docs/test-results/
          retention-days: 7
