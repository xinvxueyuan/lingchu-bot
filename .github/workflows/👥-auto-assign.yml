name: 👥 Auto Assign

on:
    issues:
        types: [opened, reopened]
    pull_request_target:
        types: [opened, reopened]

permissions:
    issues: write
    pull-requests: write

jobs:
    assign-author:
        name: 👥 Auto Assign
        runs-on: ubuntu-latest
        steps:
            # pinned from toshimaru/auto-author-assign@v3.0.2
            - uses: toshimaru/auto-author-assign@bdd7688cbf9e6d5683f02f8c7d8ae4062a254b6d
