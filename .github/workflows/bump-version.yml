name: Bump Version (Pre-release & Stable)

# 触发方式：手动触发（GitHub Actions 页面点击运行）
on:
    workflow_dispatch:
        inputs:
            # 核心参数：要升级的版本部分（必填）
            version_part:
                description: "要升级的版本部分"
                required: true
                type: choice
                options:
                    - pre_num # 升级预发行号（如 dev0 → dev1）
                    - pre_type # 切换预发行类型（如 dev → beta）
                    - major # 大版本（如 1.x.x → 2.0.0）
                    - minor # 次版本（如 x.1.x → x.2.0）
                    - patch # 小版本（如 x.x.1 → x.x.2）
                default: pre_num

            # 可选参数：预发行类型（仅切换 pre_type 时需填写）
            pre_type_value:
                description: "预发行类型（canary/dev/beta/preview）"
                required: false
                type: choice
                options:
                    - canary
                    - dev
                    - beta
                    - preview
                default: dev

            # 可选参数：是否重置预发行号（切换预发行类型/主版本时建议选 true）
            reset_pre_num:
                description: "是否重置预发行号为 0"
                required: true
                type: boolean
                default: true

            # 可选参数：是否移除预发行后缀（发布正式版时选 true）
            remove_pre:
                description: "是否移除预发行后缀（发布正式版）"
                required: true
                type: boolean
                default: false

# 工作流权限（需允许推送代码、打标签）
permissions:
    contents: write # 允许修改仓库内容（提交、打标签）
    pull-requests: write # 可选：如需自动创建PR

jobs:
    bump-version:
        runs-on: ubuntu-latest
        steps:
            # 1. 检出仓库代码（需 fetch 所有历史，否则标签推送失败）
            - name: Checkout code
              uses: actions/checkout@v6.0.2
              with:
                  fetch-depth: 0 # 拉取完整提交历史
                  token: ${{ secrets.GITHUB_TOKEN }} # 默认 token，带写入权限

            # 2. 设置 Python 环境（bump-my-version 是 Python 包）
            - name: Set up Python
              uses: actions/setup-python@v6.2.0
              with:
                  python-version: "3.10" # 兼容所有 Python 3.8+ 版本
                  cache: "pip" # 缓存 pip 依赖，加速安装

            # 3. 安装 bump-my-version 工具
            - name: Install bump-my-version
              run: |
                  pip install --upgrade pip
                  pip install bump-my-version

            # 4. 配置 Git 身份（避免提交时权限/身份错误）
            - name: Configure Git user
              run: |
                  git config --global user.name "github-actions[bot]"
                  git config --global user.email "github-actions[bot]@users.noreply.github.com"

            # 5. 构建版本升级命令并执行
            - name: Bump version
              id: bump
              run: |
                  # 初始化命令基础
                  BUMP_CMD="bump-my-version bump --part ${{ github.event.inputs.version_part }}"

                  # 场景1：切换预发行类型（如 dev → beta）
                  if [ "${{ github.event.inputs.version_part }}" = "pre_type" ]; then
                    BUMP_CMD+=" --new-version ${{ github.event.inputs.pre_type_value }}"
                  fi

                  # 场景2：重置预发行号（默认开启）
                  if [ "${{ github.event.inputs.reset_pre_num }}" = "true" ]; then
                    BUMP_CMD+=" --reset pre_num"
                  fi

                  # 场景3：移除预发行后缀（发布正式版）
                  if [ "${{ github.event.inputs.remove_pre }}" = "true" ]; then
                    BUMP_CMD+=" --remove pre_type --remove pre_num"
                  fi

                  # 打印最终命令（便于调试）
                  echo "执行版本升级命令：$BUMP_CMD"
                  # 执行版本升级
                  eval $BUMP_CMD

                  # 提取新版本号（写入步骤输出，供后续使用）
                  NEW_VERSION=$(bump-my-version show current-version)
                  echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

            # 6. 推送版本变更（提交 + 标签）
            - name: Push changes to repository
              run: |
                  # 推送提交
                  git push origin HEAD:${{ github.ref }}
                  # 推送标签（如 v0.0.0-dev1）
                  git push origin v${{ steps.bump.outputs.new_version }}
