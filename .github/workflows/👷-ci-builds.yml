name: 👷 CI-builds

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - "dev*"
      - "releases/**"
      - "feature/**"
      - "fix/**"
      - "hotfix/*"
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - "Taskfile.yml"
      - "**/*.py"
      - "**/LICENSE*"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "apps/docs/**"
      - "packages/**"
      - ".github/workflows/👷-ci-builds.yml"
  push:
    branches:
      - main
      - "dev*"
      - "releases/**"
      - "feature/**"
      - "fix/**"
      - "hotfix/*"
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - "Taskfile.yml"
      - "**/*.py"
      - "**/LICENSE*"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "apps/docs/**"
      - "packages/**"
      - ".github/workflows/👷-ci-builds.yml"

permissions:
  contents: read

concurrency:
  group: ci-builds-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 📦 Build
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
       !startsWith(github.ref, 'refs/heads/main') &&
       !startsWith(github.ref, 'refs/heads/dev'))
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout
        # pinned from actions/checkout@v6.1.0
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803

      - name: ⚡ Setup Node
        # pinned from actions/setup-node@v6.5.0
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: 24

      - name: 📦 Setup pnpm
        # pinned from pnpm/action-setup@v6.0.9
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271

      - name: 📦 Install Node dependencies
        # pinned from nick-fields/retry@v4.0.0
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60
        with:
          timeout_minutes: 5
          max_attempts: 4
          retry_wait_seconds: 30
          command: pnpm install --frozen-lockfile

      - name: ⚡ Install uv
        # pinned from astral-sh/setup-uv@v8.3.2
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          github-token: ${{ github.token }}
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: 🔨 Install Task
        # pinned from go-task/setup-task@v2.1.0
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa

      - name: 📦 Build
        run: task ci:build

      - name: 📦 Archive build artifacts
        # pinned from actions/upload-artifact@v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: assets-${{ github.sha }}
          path: dist
          if-no-files-found: error

  # ── Smoke Test ──
  # Runs the containerized smoke test suite against the freshly built
  # distribution artifacts. This validates startup, hook registration and
  # core service initialization without requiring a real OneBot connection.
  smoke-test:
    name: 🚬 Smoke test
    runs-on: ubuntu-latest
    needs: build
    if: ${{ needs.build.result == 'success' }}
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout
        # pinned from actions/checkout@v6.1.0
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803

      - name: 📦 Download build artifacts
        # pinned from actions/download-artifact@v7.0.0
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131
        with:
          name: assets-${{ github.sha }}
          path: dist

      - name: 🐳 Build smoke image
        run: docker build --build-arg SMOKE_TEST=true -t lingchu-bot:smoke .

      - name: 🚬 Run smoke tests
        run: |
          mkdir -p test-results/smoke
          docker run --rm --user root \
            -e SMOKE_TEST=true \
            -e SMOKE_TEST_RESULTS_XML=/reports/smoke-test-results.xml \
            -v "$PWD/test-results/smoke:/reports" \
            lingchu-bot:smoke

      - name: 📤 Upload smoke test report on failure
        if: failure()
        # pinned from actions/upload-artifact@v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: smoke-test-results-${{ github.sha }}
          path: test-results/smoke/smoke-test-results.xml
          if-no-files-found: ignore

  versioned-build:
    name: 🔖 Versioned build
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' &&
      (startsWith(github.ref, 'refs/heads/main') ||
       startsWith(github.ref, 'refs/heads/dev'))
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: 📥 Checkout
        # pinned from actions/checkout@v6.1.0
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
        with:
          fetch-depth: 0

      - name: ⚡ Setup Node
        # pinned from actions/setup-node@v6.5.0
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: 24

      - name: 📦 Setup pnpm
        # pinned from pnpm/action-setup@v6.0.9
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271

      - name: 📦 Install Node dependencies
        # pinned from nick-fields/retry@v4.0.0
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60
        with:
          timeout_minutes: 5
          max_attempts: 4
          retry_wait_seconds: 30
          command: pnpm install --frozen-lockfile

      - name: ⚡ Install uv
        # pinned from astral-sh/setup-uv@v8.3.2
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990
        with:
          github-token: ${{ github.token }}
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: 🔨 Install Task
        # pinned from go-task/setup-task@v2.1.0
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa

      - name: 🔖 Bump development version
        id: bump
        shell: bash
        run: |
          # Derive bump level and prerelease type from branch name:
          #
          #   Level (BUMP_LEVEL):
          #     main / dev* (no suffix) → patch
          #     dev-minor*              → minor
          #     dev-major*              → major
          #
          #   Prerelease (BUMP_PRERELEASE):
          #     dev-alpha*   → alpha   (0.0.1 → 0.0.2a1)
          #     dev-beta*    → beta    (0.0.1 → 0.0.2b1)
          #     dev-rc*      → rc      (0.0.1 → 0.0.2rc1)
          #     dev-stable*  → stable  (0.0.1.dev1 → 0.0.1)
          #     dev* / main  → dev     (0.0.1 → 0.0.2.dev1, default)
          branch="${GITHUB_REF_NAME}"
          case "$branch" in
            dev-major*)   bump_level=major ;;
            dev-minor*)   bump_level=minor ;;
            *)            bump_level=patch ;;
          esac
          case "$branch" in
            dev-alpha* | dev-minor-alpha* | dev-major-alpha*)  bump_prerelease=alpha ;;
            dev-beta*  | dev-minor-beta*  | dev-major-beta*)   bump_prerelease=beta ;;
            dev-rc*    | dev-minor-rc*    | dev-major-rc*)     bump_prerelease=rc ;;
            dev-stable*| dev-minor-stable*| dev-major-stable*) bump_prerelease=stable ;;
            *)                                                 bump_prerelease=dev ;;
          esac
          echo "bump_level=$bump_level" >> "$GITHUB_OUTPUT"
          echo "bump_prerelease=$bump_prerelease" >> "$GITHUB_OUTPUT"
          task ci:version:bump BUMP_LEVEL="$bump_level" BUMP_PRERELEASE="$bump_prerelease"

      - name: ✅ Pre-check version
        shell: bash
        run: task ci:version:precheck NEW_VERSION="${{ steps.bump.outputs.new_version }}"

      - name: 🏷️ Write version to config.py
        shell: bash
        run: task ci:version:write-config
        env:
          VERSION: ${{ steps.bump.outputs.new_version }}
          CONFIG_PATH: src/plugins/nonebot_plugin_lingchu_bot/core/config.py

      - name: ✅ Post-check version
        shell: bash
        run: task ci:version:postcheck VERSION="${{ steps.bump.outputs.new_version }}"

      - name: 📦 Build
        run: task ci:build

      - name: 🛡️ Attest build provenance
        # pinned from actions/attest-build-provenance@v4.1.0
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: "dist/*"

      - name: 📦 Archive production artifacts
        # pinned from actions/upload-artifact@v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: assets-${{ steps.bump.outputs.new_version }}
          path: dist
          if-no-files-found: error

      - name: 🏷️ Create version tag
        shell: bash
        run: task ci:version:tag-only VERSION="${{ steps.bump.outputs.new_version }}"

  # ── Smoke Test (Versioned) ──
  smoke-test-versioned:
    name: 🚬 Smoke test (versioned)
    runs-on: ubuntu-latest
    needs: versioned-build
    if: ${{ needs.versioned-build.result == 'success' }}
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout
        # pinned from actions/checkout@v6.1.0
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803

      - name: 📦 Download versioned build artifacts
        # pinned from actions/download-artifact@v7.0.0
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131
        with:
          name: assets-${{ needs.versioned-build.outputs.new_version }}
          path: dist

      - name: 🐳 Build smoke image
        run: docker build --build-arg SMOKE_TEST=true -t lingchu-bot:smoke-versioned .

      - name: 🚬 Run smoke tests
        run: |
          mkdir -p test-results/smoke
          docker run --rm --user root \
            -e SMOKE_TEST=true \
            -e SMOKE_TEST_RESULTS_XML=/reports/smoke-test-results.xml \
            -v "$PWD/test-results/smoke:/reports" \
            lingchu-bot:smoke-versioned

      - name: 📤 Upload smoke test report on failure
        if: failure()
        # pinned from actions/upload-artifact@v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: smoke-test-results-versioned-${{ github.sha }}
          path: test-results/smoke/smoke-test-results.xml
          if-no-files-found: ignore
