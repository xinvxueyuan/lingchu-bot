name: 👷 CI-builds

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - "dev*"
      - "releases/**"
      - "feature/**"
      - "fix/**"
      - "hotfix/*"
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - "Taskfile.yml"
      - "**/*.py"
      - "**/LICENSE*"
      - ".github/workflows/👷-ci-builds.yml"
  push:
    branches:
      - main
      - "dev*"
      - "releases/**"
      - "feature/**"
      - "fix/**"
      - "hotfix/*"
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - "Taskfile.yml"
      - "**/*.py"
      - "**/LICENSE*"
      - ".github/workflows/👷-ci-builds.yml"

permissions:
  contents: read

concurrency:
  group: ci-builds-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 📦 Build
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
       !startsWith(github.ref, 'refs/heads/main') &&
       !startsWith(github.ref, 'refs/heads/dev') &&
       !startsWith(github.ref, 'refs/heads/releases/'))
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout
        # pinned from actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: ⚡ Setup Node
        # pinned from actions/setup-node@v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: 📦 Setup pnpm
        # pinned from pnpm/action-setup@v6.0.8
        uses: pnpm/action-setup@d15a628ca66d93ee5f352c71671a7bc6a97af5c9

      - name: 📦 Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: ⚡ Install uv
        # pinned from astral-sh/setup-uv@v8.1.0
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          github-token: ${{ github.token }}
          enable-cache: true

      - name: 🔨 Install Task
        # pinned from go-task/setup-task@v2.1.0
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa

      - name: 📦 Build
        run: task ci:build

      - name: 📦 Archive build artifacts
        # pinned from actions/upload-artifact@v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: assets-${{ github.sha }}
          path: dist
          if-no-files-found: error

  versioned-build:
    name: 🔖 Versioned build
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' &&
      (startsWith(github.ref, 'refs/heads/main') ||
       startsWith(github.ref, 'refs/heads/dev') ||
       startsWith(github.ref, 'refs/heads/releases/'))
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: 📥 Checkout
        # pinned from actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: ⚡ Setup Node
        # pinned from actions/setup-node@v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: 📦 Setup pnpm
        # pinned from pnpm/action-setup@v6.0.8
        uses: pnpm/action-setup@d15a628ca66d93ee5f352c71671a7bc6a97af5c9

      - name: 📦 Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: ⚡ Install uv
        # pinned from astral-sh/setup-uv@v8.1.0
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          github-token: ${{ github.token }}
          enable-cache: true

      - name: 🔨 Install Task
        # pinned from go-task/setup-task@v2.1.0
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa

      - name: 🔖 Bump development version
        id: bump
        shell: bash
        run: task ci:version:bump

      - name: 🏷️ Write version to config.py
        shell: bash
        run: task ci:version:write-config
        env:
          VERSION: ${{ steps.bump.outputs.new_version }}
          CONFIG_PATH: src/plugins/nonebot_plugin_lingchu_bot/core/config.py

      - name: 📦 Build
        run: task ci:build

      - name: 🛡️ Attest build provenance
        # pinned from actions/attest-build-provenance@v4.1.0
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: "dist/*"

      - name: 📦 Archive production artifacts
        # pinned from actions/upload-artifact@v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: assets-${{ steps.bump.outputs.new_version }}
          path: dist
          if-no-files-found: error

      - name: 🔖 Commit and tag
        shell: bash
        run: task ci:version:commit-tag VERSION="${{ steps.bump.outputs.new_version }}"
