# React Doctor — finds security, performance, correctness, accessibility,
# bundle-size, and architecture issues in React codebases.
#
# Docs: https://www.react.doctor/ci
# Source: https://github.com/millionco/react-doctor
#
# NOTE: Uses CLI directly instead of millionco/react-doctor@v2 action due to
# upstream bugs (detached HEAD, ANSI leak in PR comments — see PR #80).
# Switch back to the action once upstream fixes are released.

name: 🩺 React Doctor

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "**.ts"
      - "**.tsx"
      - "**.jsx"
      - ".github/workflows/react-doctor.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  push:
    branches: [main]
    paths:
      - "**.ts"
      - "**.tsx"
      - "**.jsx"
      - ".github/workflows/react-doctor.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

permissions:
  contents: read

concurrency:
  group: react-doctor-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  react-doctor:
    name: 🩺 React Doctor Scan
    runs-on: ubuntu-latest
    steps:
      # pinned from actions/checkout@v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        # pinned from actions/setup-node@v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: Setup pnpm
        # pinned from pnpm/action-setup@v6.0.8
        uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Run React Doctor
        # --fail-on error: only block CI on errors, not warnings
        # --no-telemetry: disable analytics in CI
        env:
          NO_COLOR: 1
        run: npx react-doctor@latest . --fail-on error --no-telemetry --project docs
