# React Doctor — finds security, performance, correctness, accessibility,
# bundle-size, and architecture issues in React codebases.
#
# Docs: https://www.react.doctor/ci
# Source: https://github.com/millionco/react-doctor

name: 🩺 React Doctor

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "**.ts"
      - "**.tsx"
      - "**.jsx"
      - ".github/workflows/react-doctor.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  push:
    branches: [main]
    paths:
      - "**.ts"
      - "**.tsx"
      - "**.jsx"
      - ".github/workflows/react-doctor.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

permissions:
  contents: read
  pull-requests: write
  issues: write
  statuses: write

concurrency:
  group: react-doctor-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  react-doctor:
    name: 🩺 React Doctor Scan
    runs-on: ubuntu-latest
    steps:
      # pinned from actions/checkout@v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: millionco/react-doctor@v2
        with:
          blocking: warning
          project: "docs,web"
