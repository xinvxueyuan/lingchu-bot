name: 📚 Docs Deploy
on:
  push:
    branches:
      - main
      - dev
    paths:
      - apps/docs/**
      - packages/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - turbo.json
      - .github/workflows/📚-docs.yml
permissions:
  contents: read
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  build:
    name: 📦 Build docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 检出代码
        # pinned from actions/checkout@v6.0.3
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: 配置 Node
        # pinned from actions/setup-node@v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: 配置 pnpm
        # pinned from pnpm/action-setup@v6.0.9
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271

      - name: 安装 Node 依赖
        # pinned from nick-fields/retry@v4.0.0
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60
        with:
          timeout_minutes: 5
          max_attempts: 4
          retry_wait_seconds: 30
          command: pnpm install --frozen-lockfile

      - name: Markdown Lint
        run: pnpm exec markdownlint-cli2

      - name: Lint & Type Check
        run: pnpm turbo run lint check-types

      - name: Link Validation
        run: pnpm --filter docs lint:links

      - name: Test
        run: pnpm --filter docs test

      - name: Build
        run: pnpm turbo run build --filter=docs

      - name: 📦 Upload docs build artifacts
        # pinned from actions/upload-artifact@v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: docs-out-${{ github.sha }}
          path: apps/docs/out
          if-no-files-found: error

  # ── Docs Smoke Test ──
  # Serves the statically exported docs site and verifies that the homepage
  # responds with HTTP 200 before any deployment is attempted.
  docs-smoke:
    name: 🚬 Docs smoke test
    runs-on: ubuntu-latest
    needs: build
    if: ${{ needs.build.result == 'success' }}
    permissions:
      contents: read
    steps:
      - name: 配置 Node
        # pinned from actions/setup-node@v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: 📦 Download docs build artifacts
        # pinned from actions/download-artifact@v7.0.0
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131
        with:
          name: docs-out-${{ github.sha }}
          path: apps/docs/out

      - name: 🚬 Serve and verify homepage
        shell: bash
        run: |
          npx --yes serve -s apps/docs/out -l 3000 --no-clipboard &
          server_pid=$!
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000/ >/dev/null 2>&1; then
              echo "Docs site homepage is reachable (HTTP 200)"
              kill "$server_pid" 2>/dev/null || true
              wait "$server_pid" 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          echo "Docs site homepage did not become reachable"
          kill "$server_pid" 2>/dev/null || true
          exit 1

  deploy:
    name: 🚀 文档部署
    needs: [build, docs-smoke]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: 配置 Pages
        # pinned from actions/configure-pages@v6.0.0
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d

      - name: 📦 Download docs build artifacts
        # pinned from actions/download-artifact@v7.0.0
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131
        with:
          name: docs-out-${{ github.sha }}
          path: apps/docs/out

      - name: 上传 Pages 产物
        # pinned from actions/upload-pages-artifact@v5.0.0
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: apps/docs/out

      - name: 部署到 Pages
        # pinned from actions/deploy-pages@v5.0.0
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
        id: deployment
