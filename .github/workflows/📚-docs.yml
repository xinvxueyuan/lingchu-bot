name: 📚 文档部署
on:
  push:
    branches:
      - main
      - dev
    paths:
      - apps/docs/**
      - packages/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - turbo.json
      - .github/workflows/📚-docs.yml
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  deploy:
    name: 🚀 文档部署
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 配置 Pages
        # pinned from actions/configure-pages@v6.0.0
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d

      - name: 检出代码
        # pinned from actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: 配置 Node
        # pinned from actions/setup-node@v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: 配置 pnpm
        # pinned from pnpm/action-setup@v6.0.8
        uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9

      - name: 安装 Node 依赖
        run: pnpm install --frozen-lockfile

      - name: 安装 Task
        # pinned from go-task/setup-task@v2.1.0
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa

      - name: Check, Test & Build
        run: task ci:docs

      - name: 上传 Pages 产物
        # pinned from actions/upload-pages-artifact@v5.0.0
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: apps/docs/out

      - name: 部署到 Pages
        # pinned from actions/deploy-pages@v5.0.0
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
        id: deployment
