name: 🛡️ CodeQL Security Scan

on:
  pull_request:
    branches:
      [main, dev, "releases/**"]
    paths-ignore:
      - "**.md"
      - "**.mdx"
      - "apps/docs/content/**"
      - "LICENSE*"
      - "CHANGELOG.md"
      - ".gitignore"
      - ".editorconfig"
      - "REUSE.toml"
      - ".github/**/*.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/note/**"
  push:
    branches: [main, dev]
    paths-ignore:
      - "**.md"
      - "**.mdx"
      - "apps/docs/content/**"
      - "LICENSE*"
      - "CHANGELOG.md"
      - ".gitignore"
      - ".editorconfig"
      - "REUSE.toml"
      - ".github/**/*.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/note/**"

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: 🛡️ Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    # CodeQL needs security-events: write to upload scan results to Code Scanning,
    # and actions: read for pull request analysis to fetch workflow metadata.
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # language: python defaults to the codeql/python-queries pack, so no
          # inline config is required. Earlier versions passed `packs:
          # +codeql/python-queries` here, but CodeQL 2.26.0 strict-YAML schema
          # rejected the scalar `+codeql/python-queries` value (expected a list),
          # failing the workflow with `MismatchedInputException`.
          - language: python
          - language: javascript-typescript
    steps:
      - name: Checkout
        # pinned from actions/checkout@v6.0.3
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Initialize CodeQL
        # pinned from github/codeql-action@v3.30.6
        uses: github/codeql-action/init@64d10c13136e1c5bce3e5fbde8d4906eeaafc885
        with:
          languages: ${{ matrix.language }}
          config: ${{ matrix.config }}

      - name: Autobuild
        # pinned from github/codeql-action@v3.30.6
        uses: github/codeql-action/autobuild@64d10c13136e1c5bce3e5fbde8d4906eeaafc885

      - name: Analyze
        # pinned from github/codeql-action@v3.30.6
        uses: github/codeql-action/analyze@64d10c13136e1c5bce3e5fbde8d4906eeaafc885
